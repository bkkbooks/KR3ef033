body:
  text: 卷上太陽方總論太陽主表故立方以發表為主而發表中更兼治里故種種不同麻黃湯於發表中降氣桂枝湯於發表中滋陰葛根湯於發表中生津大青龍湯與麻杏甘膏湯麻翹赤豆湯於發表中清火小青龍湯與五苓散於發表中利水清火中復有輕重利水中各有淺深也若白虎之清火十棗之利水又解表後之證治其陷胸瀉心抵當調胃四逆真武等劑又隨症救逆之法矣大抵太陽之表不離桂枝麻黃二湯加減以心為太陽之裡也今將諸方詳論表章仲景治法令後人放膽用之則麻黃湯治傷寒而不治中風桂枝湯治中風而不治傷寒等説其可少息乎桂枝湯桂枝芍藥甘草生薑大棗此為仲景群方之魁乃滋陰和陽調和營衛解肌發汗之總方也凡頭痛發熱惡風惡寒其脈浮而弱汗自出者不拘何經不論中風傷寒雜病鹹得用此發汗若妄汗妄下而表不解者仍當用此解肌如所云頭痛發熱惡寒惡風鼻鳴乾嘔等病但見一症即是不必悉具惟以脈弱自汗為主耳桂枝赤色通心溫經能扶陽散寒甘能益氣生血辛能解散外邪內輔君主發心液而為汗故麻黃葛根青龍輩凡發汗禦寒者咸用之惟桂枝湯不可用麻黃麻黃湯不可無桂枝也本方皆辛甘發散惟芍藥微苦微寒能益陰斂血內和營氣先輩之無汗不得用桂枝湯者以芍藥能止汗也芍藥之功本在止煩煩止汗亦止故反煩更煩與心悸而煩者咸賴之若倍加芍藥即建中之劑非復發汗之劑矣是方也用桂枝發汗即用芍藥止汗生薑之辛佐桂以解肌大棗之甘佐芍以和里桂芍之相須薑棗之相得陰陽表裡並行而不悖是剛柔相濟以為和也甘草甘平有安內攘外之功用以調和氣血者即以調和表裡且以調和諸藥矣而精義尤在啜稀熱粥以助藥力蓋穀氣內充外邪勿復入熱粥以繼藥之後則餘邪勿復留復方之妙用又如此故用之發汗自不至於亡陽用之止汗自不至於貽患今人凡遇發熱不論虛實悉忌穀味刊桂枝方者俱削此法是豈知仲景之心法乎要知此方專治表虛但能解肌以發營中之汗不能開皮毛之竅以出衛分之邪故汗不出者是麻黃症脈浮緊者是麻黃脈即不得與桂枝湯矣然初起無汗當用麻黃髮汗如汗後復煩即脈浮數者不得再與麻黃而更用桂枝如汗後不解與下後脈仍浮氣上衝或下利止而身痛不休者皆當用此解外蓋此時表雖不解腠理已疏邪不在皮毛而在肌肉故脈證雖同麻黃而主治當屬桂枝也粗工妄謂桂枝湯專治中風一證印定後人耳目而所稱中風者又與此方不合故置之不用愚常以此湯治自汗盜汗虛虐虛痢隨手而愈因知仲景方可通治百病與後人分門證類使無下手處者可同年而語耶麻黃湯麻黃桂枝杏仁甘草治風寒在表頭痛項強發熱身痛腰痛骨節煩疼惡風惡寒無汗胸滿而喘其脈浮緊浮數者此為開表逐邪發汗之峻劑也古人用藥用法象之義麻黃中空外直宛如毛竅骨節故能去骨節之風寒從毛竅而出為衛分發散風寒之品桂枝之條縱橫宛如經脈系絡能入心化液通經絡而出汗為營分散解風寒之品杏仁為心果溫能助心散寒苦能清肺下氣為上焦逐邪定喘之品甘草甘平外拒風寒內和氣血為中宮安內攘外之品此湯入胃行氣於玄府輸精於皮毛斯毛脈合精而溱溱汗出在表之邪其盡去而不留痛止喘平寒熱頓解不煩啜粥而藉汗於谷也其不用薑棗者以生薑之性橫散解肌礙麻黃之上升大棗之性滯泥於膈礙杏仁之速降此欲急於直達稍緩則不迅橫散則不峻矣若脈浮弱汗自出者或尺脈微遲者是桂枝所主非此方所宜蓋此乃純陽之劑過於發散如單刀直入之將投之恰當一戰成功不當則不戢而召禍故用之發表可一而不可再如汗後不解便當以桂枝湯代之若汗出不透邪氣留連於皮毛骨肉之間又有麻桂合半與桂枝二麻黃一之妙用若陽盛於內而無汗者又有麻黃杏仁石膏連翹赤小豆等劑此皆仲景心法也豫治冷風哮與風寒濕三氣成痹等證用此輒效非傷寒一證可拘也按麻桂二方治傷寒中風者遇當用而不敢用注疏傷寒家於不當用者妄言其當用如太陽衄血證宜桂枝湯句語意在當鬚髮汗下麻黃主之句在當發其汗下二句皆於結句補出是倒序法也仲景於論證時細明其所以然未及於方故耳夫桂枝乃行血之品仲景用桂枝發汗不是用桂枝止衄是用在未衄時非用在已衄後且奪血者無汗此理甚明麻黃乃上升之品夫既云衄乃解又云自衄者愈若復用升提之藥衄流不止可必矣且衄家不可發汗此禁甚明矣又如小青龍主之句語意在服湯已上豈有寒去欲解反用燥熱之劑重亡津液令渴不解乎且云服藥已服藥已者是何藥何湯耶觀仲景於所服藥不合法者必明斥之如所云服瀉心湯復以他藥下之利不止又云知醫以他藥下之非其治也粗工不知倒序等法又溺於風寒二字而曰是雖熱甚邪由在經以麻黃治衄是發散經中邪氣耳請問邪氣寒乎熱乎若寒邪則血凝不流焉得有衄若熱邪則清降不遑而敢升發耶且云點滴不成流者必用服藥若成流不止將何法以善其後乎此誤天下蒼生之最盛者余因表而出之葛根湯葛根麻黃桂枝白芍甘草薑棗治頭項強痛背亦強牽引𠘧𠘧然脈浮無汗惡寒兼治風寒在表而自利者此開表逐邪之輕劑也其證身不疼腰不痛骨節不痛是骨不受寒矣頭項強痛下連於背牽引不寧是筋傷於風矣不喘不煩躁不幹嘔是無內症無汗而惡風病只在表若表病而兼下利是表實裡虛矣比麻黃青龍之劑較輕然𠘧𠘧更甚於項強而無汗不失為表實脈浮不緊數是中於鼓動之陽風故以桂枝湯為主而加麻葛以攻其表實也葛根味甘氣涼能起陰氣而生津液滋筋脈而舒其牽引故以為君麻黃生薑能開玄府腠理之閉塞祛風而出汗故以為臣寒熱俱輕故少佐桂芍同甘棗以和里此於麻桂二方之間衡其輕重而為調和表裡之劑也故用之以治表實而外邪自解不必治裡虛而下利自瘳與大青龍治表裡俱實者異矣要知葛根秉性輕清賦體厚重輕可去實重可鎮動厚可固里一物而三美備然惟表實裡虛者宜之胃家實者非所宜也故仲景於陽明經中不用葛根東垣用藥分經不列於太陽而列於陽明易老云未入陽明者不可服皆未知此義喻氏謂仲景不用於陽明恐亡津液與本草生津之説左又謂能開肌肉又與仲景治汗出惡風桂枝湯中加葛根者左矣蓋桂枝葛根俱是解肌和里之劑故有汗無汗下利不下利皆可用與麻黃專於治表者不同麻黃葛根俱有沫沫者濁氣也故仲景皆以水煮去其沫而後入諸藥此取其清揚發腠理之義桂枝湯啜稀粥者因無麻黃之開而有芍藥之斂恐邪有不盡故假穀氣以逐之此汗生於穀也大青龍湯麻黃桂枝石膏杏仁甘草薑棗太陽中風脈浮緊頭痛發熱惡寒身疼不汗出而煩躁此麻黃證之劇者故加味以治之也諸證全是麻黃有喘與煩躁之別喘者是寒鬱其氣升降不得自如故多用杏仁之苦以降氣煩躁是熱傷其氣無津不能作汗故特加石膏之甘以生津然其性沉而大寒恐內熱頓除而表寒不解變為寒中而挾熱下利是引賊破家矣故必倍麻黃以發表又倍甘草以和中更用薑棗以調營衛一汗而表裡雙解風熱兩除此大青龍清內攘外之功所以佐麻桂二方之不及也夫青龍以發汗命名其方分大小在麻黃之多少而不關石膏觀小青龍之不用可知石膏不能驅在表之風寒但能清中宮之燔灼觀白虎之多用可知世不知石膏為煩躁用妄為發汗用十劑之輕可去實豈至堅至重之質而能發汗哉汗多亡陽者過在麻黃耳少陰亦有發熱惡寒煩躁之症與大青龍同但脈不浮頭不痛為異若脈浮弱汗自出者是桂枝證二證妄與石膏則胃氣不至於四肢而手足厥冷妄用麻黃則衛陽不周於身而筋惕肉瞤此仲景所深戒也要知少陰見陽證而用麻黃必固以附子太少異位陰陽殊途故寒溫有別桂枝證之煩因於木旺故用微苦微寒之劑以升降之大青龍之兼躁因於風動故用至陰至重之品以鎮墜之有汗無汗虛實不同輕重有差也必細審其所不用然後不失其所當用耳按許叔微云桂枝治中風麻黃治傷寒大青龍治中風見寒脈傷寒見風脈三者如鼎立此方氏三大綱所由來而大青龍之證治自此不明於世矣不知仲景治表只在麻桂二法麻黃治表實桂枝治表虛方治在虛實上分不在風寒上分也蓋風寒二證俱有虛實俱有淺深俱有營衛大法又在虛實上分淺深並不在風寒上分營衛也夫有汗為表虛立桂枝湯治有汗之風寒而更有加桂去桂加芍去芍及加附子人參厚朴杏仁茯苓白朮大黃龍骨牡蠣等劑皆是桂枝湯之變局因表虛中更有內虛內實淺深之不同故加減法亦種種不一耳以無汗為表實而立麻黃湯治無汗之風寒然表實中亦有夾寒夾暑內寒內熱之不同故以麻黃為主而加減者若葛根湯大小青龍麻黃附子細辛甘草麻黃杏仁甘草石膏麻黃連翹赤豆等劑皆麻黃湯之變局因表實中亦各有內外寒熱淺深之殊也葛根湯因肌肉津液不足而加芍藥葛根大青龍因內熱煩躁而加石膏小青龍以乾嘔而咳而加半夏細辛乾薑麻黃附子細辛甘草二方以脈沉而加附子若連翹赤豆梓皮濕熱發黃而加諸劑皆因表實從麻黃湯加減何得獨推大青龍為鼎立耶何但知有風寒而不知有風熱但知有中風見寒傷寒見風之症而不知小青龍之治風寒大青龍之治風熱麻杏甘膏之治溫熱麻翹豆湯之治濕熱表實中更有如是之別耶且前輩之鑿分風寒者拘於脈耳不知仲景之論脈甚活而不拘如大青龍之條有中風而脈浮緊傷寒而脈浮緩是互文見意處言中風脈緩然亦有脈浮緊者傷寒脈緊然亦有脈浮緩者蓋中風傷寒各有淺深或因人之強弱而異地之高下而異時之乖和而異證既不可拘脈即不可執如陽明中風而脈浮緊太陰傷寒而脈浮緩不可謂脈緊必傷寒脈緩必中風矣按內經脈滑曰風則風脈原無定象又盛而緊曰脹則緊脈不專屬傷寒又緩而滑為熱中則緩脈亦不專指中風矣且陽明中風有脈浮而緊者又有脈弦浮大者必欲以太陽之脈緩自汗脈緊無汗定分風寒割裂營衛他經皆有中風皆不言及何耶要知脈緊固為有力脈浮緩亦不是浮弱即內經緩而滑為熱中之脈也蓋仲景憑脈辨證只審虛實故不論中風傷寒脈之緩緊但於指下有力者為實脈弱無力者為虛不汗出而煩躁者為實汗出多而煩躁者為虛證在太陽而煩躁者為實證在少陰而煩躁者為虛實者可服大青龍虛者便不可服此最易知也凡先煩不躁而脈浮者必有汗而自解煩躁而脈浮緊者必無汗而不解大青龍湯為風寒在表而兼熱中者設不是為有表無里而設故中風無汗煩躁者可用傷寒而無汗煩躁者亦可用蓋風寒本是一氣故湯劑可以互投論中有中風傷寒互稱者如大青龍是也有中風傷寒兼提者如小柴胡是也仲景但細辨脈症而施治何嘗拘拘於中風傷寒之別其名乎如既立麻黃湯治寒桂枝湯治風而中風見寒傷寒見風者曷不用桂枝麻黃合半湯而更用大青龍為主治耶且既有中風惡風不惡寒傷寒惡寒不惡風之説曷不用大青龍之惡寒主傷寒麻黃證之惡風主中風桂枝證之惡風復惡寒主中風見寒傷寒見風耶方氏因三綱之分而有風寒多少之陋見喻氏又因大青龍之名而為龍背龍腹龍尾之奇説又謂縱橫者龍之所以飛期門及大青龍之位青龍之説愈工而青龍之法愈湮此所謂好龍而不識真龍者也大青龍之點睛在無汗煩躁無少陰證二句合觀之知本方本為太陽煩躁而設仲景恐人誤用青龍不特為脈弱汗出者禁而吃緊尤在少陰蓋少陰亦有發熱惡寒身疼無汗而煩躁之症此陰極似陽寒極反見熱化也誤用則厥逆筋惕肉瞤所必至全在此處著眼故必審其非少陰證而為太陽煩躁無疑太陽煩躁為陽盛非大青龍不解故不特脈浮緊之中風可用即浮緩而不微弱之傷寒亦可用也不特身疼身重者可用即身不疼與身重而乍有輕時者亦可用也蓋胃脘之陽內郁胸中而煩外擾四肢而躁第用麻黃髮汗於外不加石膏泄熱於內煩躁不解陽盛而死矣諸家不審煩躁之理以致少陰句無所著落妄謂大青龍為風寒兩傷營衛而設不知其為兩解表裡而設請問石膏之設為治風歟治寒歟營分藥歟衛分藥歟只為熱傷中氣用之治內熱耳小青龍湯麻黃桂枝白芍甘草乾薑細辛半夏五味傷寒表不解心下有水氣乾嘔發熱而渴或利或噎或小便不利少腹滿或喘者用此發汗利水夫陽之汗以天地之雨名之水氣入心則為汗一汗而外邪頓解矣此因心氣不足汗出不徹故寒熱不解而心下有水氣其咳是水氣射肺之徵乾嘔知水氣未入於胃也心下乃胞絡相火所居之地水火相射其病不可擬摹如水氣下而不上則或渴或利上而不下則或噎或喘留於腸胃則小便不利而少腹滿耳惟發熱乾嘔而渴是本方之當證此於桂枝湯去大棗之泥加麻黃以開玄府細辛逐水氣半夏除嘔五味乾薑以除咳也以乾薑易生薑者生薑之味氣不如乾薑之猛烈其大溫足以逐心下之水苦辛可以解五味之酸且發表既有麻黃細辛之直鋭更不藉生薑之橫散矣若渴者是心液不足故去半夏之燥熱加栝蔞根之生津若微利與噎小便不利與喘者病機偏於向里故去麻黃之發表加附子以除噎芫花茯苓以利水杏仁以定喘耳兩青龍俱兩解表裡法大青龍治裡熱小青龍治裡寒故發表之藥同而治里之藥殊也此與五苓同為治表不解而心下有水氣在五苓治水蓄而不行故大利其水而微發其汗是為水鬱折之也本方治水之動而不居故備舉辛溫以散水並用酸苦以安肺培其化源也兼治膚脹最捷葛根與大小青龍皆合麻桂二方加減葛根減麻黃杏仁者以不喘故加葛根者和太陽之津升陽明之液也大青龍減桂枝芍藥者以汗不出故加石膏者煩躁故也若小青龍減麻黃之杏仁桂枝之生薑大棗既加細辛乾薑半夏五味而又立加減法神而明之不可勝用矣此方又主水寒在胃久咳肺虛五苓散澤瀉白朮茯苓豬苓桂枝太陽本病脈浮發汗表證雖解而膀胱之熱邪猶存用之利水止渴下取上效之法桂性熱少加為引導五苓能通調水道培助土氣其中有桂枝以宣通衛陽停水散表裡和則火熱自化而津液得全煩渴不治而治矣治太陽發汗後表熱不解脈浮數煩渴飲水或水入即吐或飲水多而小便不利者凡中風傷寒結熱在裡熱傷氣分必煩渴飲水治之有二法表症已罷而脈洪大是熱邪在陽明之半表裡用白虎加人參清火以益氣表症未罷而脈仍浮數是寒邪在太陽之半表裡用五苓散飲暖水利水而發汗此因表邪不解心下之水氣亦不散既不能為溺更不能生津故渴及與之水非上焦不受即下焦不通所以名為水逆水者腎所司也澤瀉味鹹入腎而培水之本豬苓黑色入腎以利水之用白朮味甘歸脾制水之逆流茯苓色白入肺清水之源委而水氣順矣然表裡之邪諒不因水利而頓解故必少加桂枝多服暖水使水精四布上滋心肺外達皮毛溱溱汗出表裡之煩熱兩除也白飲和服亦啜稀粥之微義又復方之輕劑矣本方非能治消渴也注者不審消渴之理及水逆之性稱為化氣回津之劑夫四苓之燥桂枝之熱何所恃而津回豈知消渴與水逆不同消字中便見飲水多能消則不逆矣本論云飲水多者小便利必心下悸是水蓄上焦為逆小便少者必苦裡急是水蓄下焦為逆也又云渴欲飲水者以五苓散救之可知用五苓原是治水不是治渴用以散所飲之水而非治煩渴消渴之水也且本方重在內煩外熱用桂枝是逐水以除煩不是熱因熱用是少發汗以解表不是助四苓以利水其用四苓是行積水留垢不是疏通水道後人不明此理概以治水道不通夫熱淫於內者心下已無水氣則無水可利無汗可發更進燥烈之品津液重亡其能堪耶本論云下後復發汗小便不利者亡津液故也勿治之又云若亡津液陰陽自和者必自愈又云汗出多胃中燥不可用豬苓湯復利其小便夫利水諸方惟豬苓湯為潤劑尚不可用其不欲飲水而小便不利者五苓散之當禁不待言矣十棗湯大棗芫花甘遂大戟治太陽中風表解后里氣不和下利嘔逆心下至脅痞滿硬痛頭痛短氣汗出不惡寒者仲景利水之劑種種不同此其最峻者也凡水氣為患或喘或咳或利或吐或吐利而無汗病一處而已此則外走皮毛而汗出內走咽喉而嘔逆下走腸胃而下利水邪之泛溢者既浩潔莫御矣且頭痛短氣心腹脅下皆痞硬滿痛是水邪尚留結於中三焦升降之氣拒隔而難通也表邪已罷非汗散所宜里邪充斥又非滲泄之品所能治非選利水之至鋭者以直折之中氣不支亡可立待矣甘遂芫花大戟皆辛苦氣寒而秉性最毒並舉而任之氣同味合相須相濟決瀆而大下一舉而水患可平矣然邪之所湊其氣已虛而毒藥攻邪脾胃必弱使無健脾調胃之品主宰其間邪氣盡而元氣亦隨之盡故選棗之大肥者為君預培脾土之虛且制水勢之橫又和諸藥之毒既不使邪氣之盛而不制又不使元氣之虛而不支此仲景立法之盡善也用者拘於甘能緩中之説豈知五行承製之理乎張子和制浚川禹功神祐等方治水腫痰飲而不知君補劑以護本但知用毒藥以攻邪所以善全者鮮麻黃杏仁甘草石膏湯此溫病發汗逐邪之主劑也凡冬不藏精之人熱邪內伏於臟腑至春風解凍伏邪自內而出法當乘其勢而汗之勢隨汗散矣然發汗之劑多用桂枝此雖頭項強痛反不惡寒而渴是有熱而無寒桂枝下咽陽盛則斃故於麻黃湯去桂枝之辛熱易石膏之甘寒以解表裡俱熱之症岐伯所云未滿三日可汗而已者此法是也此病得於寒時而發於風令故又名風溫其脈陰陽俱浮其症自汗身重蓋陽浮則強於衛外而閉氣故身重當用麻黃開表以逐邪陰浮不能藏精而汗出當用石膏鎮陰而清火表裡俱熱則中氣不運升降不得自如故多眠息鼾語言難出當用杏仁甘草以調氣此方備升降輕重之性足以當之若攻下火熏等法此粗工促病之術也凡風寒在表頭痛發熱惡寒無汗者必用麻黃髮汗汗後復煩更用桂枝發汗若溫病發汗已而身灼熱是內熱猖獗雖汗出而喘不可更用桂枝湯蓋溫暑之邪當與汗俱出而勿得止其汗即灼然之大熱仍當用此方開表以清裡降火而平喘蓋治內蘊之火邪與外感之餘熱不同法也若被下而小便不利直視失溲者真陰虛極而不治若汗出而喘是熱勢仍從外越雖未下前之大熱因下而稍輕仍當涼散亦不得仿風寒未解之例下後氣上衝者更行桂枝湯也是方也溫病初起可用以解表而清裡汗後可復用下後可復用與風寒不解而用桂枝湯同法仲景因治風寒汗下不解之證必須桂枝故特出此涼解之義以比類桂枝加厚朴杏仁湯證正與風寒溫病分涇渭處合觀溫病提綱而大旨顯然矣此大青龍之變局白虎湯之先著也石膏為清火重劑青龍白虎皆賴以建功然用之謹甚故青龍以惡寒脈緊兼用薑桂以扶衛外之陽白虎以汗後煩渴兼用參米以保胃脘之陽也此但熱無寒佐薑桂則脈流薄疾斑黃狂亂作矣此但熱不虛加參米則食入於陰氣長於陽譫語腹脹矣凡外感之汗下後汗出而喘為實重在存陰者不必慮其亡陽也然此為解表之劑若無喘鼾語言難出等證則又白虎湯之證治矣此方治溫病表裡之實白虎加參米治溫病表裡之虛相須相濟者也若葛根黃連黃芩湯則治利而不治喘要知溫病下後無利不止證葛根黃連之燥非治溫藥且麻黃專於外達與葛根之和中發表不同石膏甘潤與黃連之苦燥懸殊同是涼解表裡同是汗出而喘而用藥有毫釐千里之辨矣麻黃連翹赤小豆湯麻黃連翹赤小豆梓白皮杏仁甘草生薑大棗治太陽傷寒妄下熱入但頭汗出小便不利身體發黃此以赤小豆梓皮為君而冠以麻黃者見此為麻黃湯之壞症此湯為麻黃湯之變劑也傷寒不用麻黃髮汗而反下之熱不得越因瘀於裡熱邪上炎故頭有汗無汗之處濕熱熏蒸身必發黃水氣上溢皮膚故小便不利此心肺為瘀熱所傷營衛不和故耳夫皮膚之濕熱不散仍當發汗而在裡之瘀熱不清非桂枝所宜必擇味之酸苦氣之寒涼而能調和營衛者以涼中發表此方所由制也小豆赤色心家谷也酸以收心氣甘以瀉心火專走血分通經絡行津液而利膀胱梓白皮色白肺家藥也寒能清肺熱苦以瀉肺氣專走氣分清皮膚理胸中而散煩熱故以為君佐連翹杏仁以瀉心麻黃生薑以開表甘草大棗以和胃潦水味薄流而不止故能降火而除濕取而煮之半日服盡者急方通劑不必緩也夫麻黃一方與桂枝合半則小發汗加石膏薑棗即於發表中清火而除煩躁去桂枝之辛熱加石膏之辛寒則於發表中清火而定喘君以文蛤即於發表中祛內外之濕熱加連翹等之苦寒即於發表中清火而治黃仲景於太陽中隨證加減曲盡麻黃之長技不拘於冬月之嚴寒而用矣若加附子細辛之大辛熱加附子甘草之辛甘亦因少陰表裡之微甚並非為嚴寒之時拘也文蛤湯文蛤麻黃石膏杏仁甘草薑棗病發於陽應以汗解庸工用水攻之法熱被水劫而不得散外則肉上粟起因濕氣凝結於玄府也內則煩熱意欲飲水是陽邪內郁也當渴而反不渴者皮毛之水氣入肺也夫皮肉之水氣非五苓散之可任而小青龍之溫散又非內煩者之所宜故制文蛤湯文蛤生於海中而不畏水其能制水可知咸能補心寒能勝熱其殼能利皮膚之水其肉能止胸中之煩故以為君然陽為陰鬱非汗不解而濕在皮膚又不當動其經絡熱淫於內亦不可發以大溫故於麻黃湯去桂枝而加石膏薑棗此亦大青龍之變局也其不瘥者更與五苓散以除未盡之邪若汗出已而腹中痛者更與芍藥湯以和肝脾之氣按本論以文蛤一味為散以沸湯和方寸匕服滿五合此等輕劑恐難散濕熱之重邪金匾要略云渴欲飲水不止者文蛤湯主之審症用方則此湯而彼散故移彼方而補入於此桂枝二麻黃一湯桂枝湯二分麻黃湯一分服桂枝湯後而惡寒發熱如瘧者是本當用麻黃髮汗而用桂枝則汗出不徹故也凡太陽發汗太過則轉屬陽明不及則轉屬少陽此雖寒熱往來而頭項強痛未罷是太陽之表尚在故仍在太陽夫瘧因暑邪久留而內著於募原故發作有時日不再作此因風邪泊於營衛動靜無常故一日再發或三度發耳邪氣稽留於皮毛肌肉之間固非桂枝湯之可解已經汗過又不宜麻黃湯之峻攻故取桂枝湯三分之二麻黃湯三分之一合而服之再解其肌微開其表審發汗於不發之中此又用桂枝後更用麻黃法也後人合為一方者是大背仲景比較二方之輕重偶中出奇之妙理矣桂枝麻黃合半湯桂枝湯三合麻黃湯三合太陽病得之八九日如瘧狀發熱惡寒熱多寒少面有赤色者是陽氣拂鬱在表不得越因前此當汗不汗其身必癢法當小發汗故以麻桂二湯各取三分之一合為半服而急汗之蓋八九日來正氣已虛表邪未解不可不汗又不可多汗多汗則轉屬陽明不汗則轉屬少陽此欲只從太陽而愈不再作經故立此法耳此與前症大不同前方因汗不如法雖不徹而已得汗故取桂枝二分入麻黃一分合為二升分再服而緩汗之此因未經發汗而病日已久故於二湯各取三合併為六合頓服而急汗之兩湯相合涇渭分明見仲景用偶方輕劑其中更有緩急大小反佐之不同矣原法兩湯各煎而合服猶水陸之師各有節制兩軍相為表裡異道夾攻之義也後人算其分兩合為一方與葛根青龍輩何異桂枝二越婢一湯金匱越婢湯麻黃石膏甘草薑棗太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗故立此方按本論無越婢症亦無越婢湯後人取金匱方補之竊謂仲景言不可發汗則必不用麻黃言無陽是無胃脘之陽亦不用石膏古方多有名同而藥不同者安可循名而不審其實也此等脈症最多宜用柴胡桂枝為恰當按喻嘉言云越婢者石膏之辛涼也以此兼解其寒夫辛涼之品豈治寒之劑乎考越婢方比大青龍無桂枝杏仁與麻黃杏子石膏湯同為涼解表裡之劑此不用杏仁之苦而用薑棗之辛甘可以治太陽陽明合病熱多寒少而無汗者猶白虎湯證背微惡寒之類而不可以治脈弱無陽之證也按外臺祕要云越脾湯易此一字便合內經脾不濡脾不能為胃行其津液之義是脾經不足而無汗者可用此起太陰之津以滋陽明之液而發汗如成氏所云發越脾氣者是也然必兼見煩渴之症脈雖不長大浮緩而不微弱者宜之桂枝加附子湯太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者此發汗不如法也病在太陽固當發汗然得微似有汗者佳發汗太過陽氣無所止息而汗出不止矣汗多亡陽玄府不蔽風乘虛入故復惡風津液外泄不能潤下故小便難四肢者諸陽之本陽氣者柔則養筋開闔不得寒氣從之故筋急而屈伸不利此離中陽虛不能斂液當用桂枝湯補心之陽陽密則漏汗自止惡風自罷矣坎中陽虛不能制水必加附子以固腎之陽陽回則小便自利四肢自柔矣漏不止與大汗出不同服桂枝湯後大汗出而大煩渴是陽陷於裡急當滋陰故用白虎加參以和之用麻黃湯遂漏不止是陽亡於外急當扶陽故用桂枝加附以固之要知發汗之劑用桂枝太過則陽陷於裡用麻黃太過則陽亡於外因桂枝湯有芍藥而無麻黃故雖大汗出而玄府仍能自閉但能使陽盛斷不致亡陽又與汗出不解者異此發汗汗遂不止是陽中之陽虛不能攝汗所以本證之惡風不除而變症有四肢拘急之患小便難之理故仍用桂枝加附以固太陽衛外之氣也彼發汗汗出不解是陰中之陽虛汗雖出而不徹所以本證之發熱不除而變症見頭眩身振之表心下悸之裡故假真武湯以固坎中真陰之本也與傷寒自汗條似同而實異彼腳攣急在未汗前是陰虛此四肢急在發汗後是陽虛自汗因心煩其出微遂漏因亡陽故不止小便數尚不難惡寒微不若惡風之甚腳攣急尚輕於四肢不利也彼用芍藥甘草湯此用桂枝加附子其命劑懸殊矣芍藥甘草附子湯發汗而病不解反惡寒其裡虛可知也夫發汗所以逐寒邪故只有寒去而熱不解者今惡寒比未汗時反甚表雖不解急當救里矣蓋太陽有病本由少陰之虛不能藏精而為陽之守若發汗以扶陽寒邪不從汗解是又太陽陽虛不能衛外令陰邪得以久留亡陽之兆已見於此仍用薑桂以攻裡非以扶陽而反以亡陽矣故於桂枝湯去桂枝薑棗取芍藥收少陰之精甘草緩陰邪之逆加附子固坎中之火但使腎中元陽得位表邪不治而自解矣按少陰亡陽之症未曾立方本方恰與此症相合芍藥止汗收肌表之餘津甘草和中除咽痛而止吐利附子固少陰而招失散之陽溫經絡而緩脈中之緊此又仲景隱而未發之旨歟作芍藥甘草湯治腳攣急因其陰虛此陰陽俱虛故加附子皆治里不治表之義桂枝甘草湯此補心之峻劑也發汗過多則心液虛心氣餒故心下悸叉手冒心則外有所衛得按則內有所依如此不堪之狀望之而知其虛矣桂枝本營分藥得麻黃生薑則令營氣外發而為汗從辛也得芍藥則收斂營氣而止汗從酸也得甘草則內補營氣而養血從甘也此方用桂枝為君獨任甘草為佐以補心之陽則汗出多者不至於亡陽矣薑之辛散棗之泥滯固非所宜並不用芍藥者不欲其苦泄也甘溫相得氣和而悸自平與心中悸而煩心下有水氣而悸者迥別茯苓桂枝甘草大棗湯發汗後心下悸欲得按者心氣虛而不自安故用桂枝甘草湯以補心若臍下悸欲作奔豚者是腎水乘心而上克故制此方以瀉腎豚為水畜奔則昂首疾馳酷肖水勢上攻之象此症因以為名臍下悸時水氣尚在下焦欲作奔豚之兆而未發也當先其時而急治之君茯苓之淡滲以伐腎邪佐桂枝之甘溫以保心氣甘草大棗培土以制水亢則害者承乃制矣瀾水狀似奔豚而性則柔弱故又名勞水用以先煮茯苓水鬱折之之法繼以諸甘藥投之是制以所畏令一惟下趨耳桂枝去芍藥生薑新加人參湯發汗後又見身疼痛是表虛不得更兼辛散故去生薑脈沉為在裡遲為臟寒自當遠斥陰寒故去芍藥惟在甘草大棗以佐桂枝則桂枝當入心養血之任不復為解肌發汗之品矣然不得大補元氣之味以固中則中氣不能遽復故加人參以通血脈則營氣調和而身痛自瘳名曰新加者見表未解者前此無補中法今因脈沉遲故爾始加也此與用四逆湯治身疼脈沉之法同彼在未汗前而脈反沉是內外皆寒故用乾薑生附大辛大熱者協甘草以逐裡寒而表寒自解此在發汗後而脈沉遲是內外皆虛故用人參之補中益氣者以助桂枝甘草而通血脈是調中以發表之義也此與桂枝人參湯不同者彼因妄下而胃中虛寒故用薑術表尚協熱故倍桂甘此因發汗不如法亡津液而經絡空虛故加人參胃氣未傷不須白朮胃中不寒故不用幹薑耳是敦厚和平之劑也坊本作加芍藥生薑者誤桂枝去桂加茯苓白朮湯服桂枝湯已桂枝症仍在者當仍用桂枝如前法而或妄下之下後其本症仍頭痛項強翕翕發熱而反無汗其變症心下滿微痛而小便不利法當利小便則愈矣凡汗下之後有表裡症兼見者見其病機向里即當救其里症心下滿而不硬痛而尚微此因汗出不徹有水氣在心下也當問其小便若小便利者病仍在表仍鬚髮汗如小便不利者病根雖在心下而病機實在膀胱由膀胱之水不行致中焦之氣不運營衛之汗反無乃太陽之府病非桂枝症未罷也病不在經不當發汗病已入腑法當利水故於桂枝湯去桂而加苓術則薑芍即為利水散邪之佐甘棗得效培土製水之功非復辛甘發散之劑矣蓋水結中焦可利而不可散但得膀胱水去而太陽表裡之邪悉除所以與小青龍五苓散不同法經曰血之與汗異名而同類又曰膀胱津液氣化而後能出此汗由血化小便由氣化也桂枝為血分藥但能發汗不能利水觀五苓方未云多服暖水出汗愈此云小便利則愈比類二方可明桂枝去桂之理矣今人不審概用五苓以利水豈不悖哉桂枝人參湯桂枝甘草乾薑白朮人參葛根黃連黃芩湯葛根黃連黃芩甘草太陽病外症未解而反下之遂協熱而利心下痞硬脈微弱者用桂枝人參湯本桂枝症醫反下之利遂不止其脈促喘而汗出者用葛根黃連黃芩湯二症皆因下後外熱不解下利不止一以脈微弱而心下痞硬是脈不足而症有餘一以脈促而喘反汗出是脈有餘而症不足表裡虛實當從脈而辨症矣弱脈見於數下後則痞硬為虛非辛熱何能化痞而軟硬非甘溫無以止利而解表故用桂枝甘草為君佐以乾薑參術先煎四味後內桂枝使和中之力饒而解肌之氣鋭是又於兩解中行權宜法也桂枝症脈本緩誤下後而反促陽氣重可知邪束於表陽擾於內故喘而汗出利遂不止者此暴注下迫屬於熱與脈微弱而協熱利者不同表熱雖未解而大熱已入里故非桂枝芍藥所能和亦非厚朴杏仁所能解矣故君氣輕質重之葛根以解肌而止利佐苦寒清肅之芩連以止汗而除喘用甘草以和中先煮葛根後內諸藥解肌之力優而清中之氣鋭又與補中逐邪之法迥殊矣上條脈症是陽虛表雖有熱而里則虛寒下條脈症是陽盛雖下利不止而表裡俱熱同一協熱利同是表裡不解而寒熱虛實攻補不同前方用理中加桂枝而冠桂枝於人參之上後方用瀉心加葛根而冠葛根於芩連之首不名理中瀉心者總為表未解故仍不離解肌之名耳仲景制兩解方補中亦能解表涼中亦能散表補中亦能散痞涼中亦能止利若失之毫釐差之千里矣桂枝去芍藥湯桂枝去芍藥加附子湯太陽病下之後脈促胸滿者桂枝去芍藥湯主之若更見微惡寒者去芍藥方中加附子主之夫促為陽脈胸滿為陽症然陽盛則促陽虛亦促陽盛則胸滿陽虛亦胸滿此下後脈促而不汗出胸滿而不喘非陽盛也是寒邪內結將作結胸之脈桂枝湯陽中有陰去芍藥之寒酸則陰氣流行而邪自不結即扶陽之劑矣若微見惡寒則陰氣凝聚恐薑桂之力薄不能散邪加附子之辛熱為純陽之劑矣仲景於桂枝湯一減一加皆成溫劑而更有淺深之殊也桂枝加厚朴杏仁湯治太陽下後微喘而表未解者夫喘為麻黃症方中治喘者功在杏仁桂枝本不治喘此因妄下後表雖不解腠理已疏則不當用麻黃而宜桂枝矣所以宜桂枝者以其中有芍藥也既有芍藥之斂若但加杏仁則喘雖微恐不能勝任必加厚朴之辛溫佐桂以解肌佐杏仁以降氣故凡喘家不當用麻黃湯而作桂枝湯者加厚朴杏仁為佳法矣桂枝加芍藥湯桂枝加大黃湯妄下後外不解而腹滿時痛是太陽太陰並病若大實痛是太陽陽明並病此皆因妄下而轉屬非太陰陽明之本證也脾胃同處中宮位同而職異太陰主出太陰病則穢腐之出不利故腹時痛陽明主納陽明病則穢腐燥結而不行故大實而痛仍主桂枝湯者是桂枝證未罷不是治病求本亦不是升舉陽邪仲景治法只舉目前不拘前症如二陽並病太陽證罷但潮熱汗出大便難而譫語者即用大承氣矣此因表症未罷而陽邪已陷入太陰故倍芍藥以滋脾陰而除滿痛此用陰和陽法也若表邪未解而陽邪陷入於陽明則加大黃以潤胃燥而除其大實痛此雙解表裡法也凡妄下必傷胃氣胃陽虛即陽邪襲陰故轉屬太陰胃液涸則兩陽相搏故轉屬陽明屬太陰則腹滿時痛而不實陰道虛也屬陽明則腹大實而痛陽道實也滿而時痛下利之兆大實而痛是燥屎之徵桂枝加芍藥小試建中之劑桂枝加大黃微示調胃之方茯苓桂枝白朮甘草湯治傷寒吐下後心下逆滿氣上衝胸起則頭眩脈沉緊復發汗而動經身為振搖者此太陽轉屬厥陰之症也吐下後既無下利胃實症是不轉屬太陰陽明心下又不痞硬而逆滿是病已過太陽矣此非寒邪自外而內結乃肝邪自下而上達其氣上衝心可知也下實而上虛故起則頭眩脈因吐下而沉是沉為在裡矣復發汗以攻其表經絡空虛故一身振搖也夫諸緊為寒而指下須當深辨浮沉俱緊者傷寒初起之脈也浮緊而沉不緊者中風脈也若下後結胸熱實而脈沉緊便不得謂之裡寒此吐下後熱氣上衝更非裡寒之脈矣緊者弦之轉旋浮而緊者名弦是風邪外傷此沉而緊之弦是木邪內發凡厥陰為病氣上衝心此因吐下後胃中空虛木邪因而為患是太陽之轉屬而非厥陰之自病也君以茯苓以清胸中之肺氣則治節出而逆氣自降用桂枝以補心血則營氣復而經絡自和白朮培既傷之元氣而胃氣可復甘草調和氣血而營衛以和則頭自不眩而身不振搖矣若粗工遇之鮮不認為真武症桂枝加桂湯燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者先灸其核上各一壯乃與此湯寒氣外束火邪不散發為赤核是將作奔豚之兆也從少腹上衝心是奔豚已發之象也此因當汗不發汗陽氣不舒陰氣上逆必灸其核以散寒仍用桂枝以解外更加桂者補心氣以益火之陽而陰自平也前條發汗後臍下悸是水邪乘陽虛而犯心故君茯苓以清水之源此表寒未解而少腹上衝是水邪挾陰氣以凌心故加肉桂以溫水之主前症已在裡而奔豚未發此症尚在表而奔豚已發故治有不同桂枝不足以勝風先刺風池風府復與桂枝以祛風燒針不足以散寒先灸其核與桂枝加桂以散寒皆內外夾攻法又先治其外後治其內之理也桂枝加芍藥治陽邪下陷桂枝更加桂治陰邪上攻只在一味中加分兩不於本方外求他味不即不離之妙如此桂枝去芍藥加蜀漆龍骨牡蠣救逆湯傷寒者寒傷君主之陽也以火迫劫汗並亡君主之陰此為火逆矣蓋太陽傷寒以發汗為主用麻黃髮汗是為扶陽用火劫汗猶挾天子以令諸侯權不由主此汗不由心也故驚狂而起臥不安猶芒刺在背之狀矣心為陽中之陽太陽之汗心之液也凡發熱自汗出者是心液不收桂枝方用芍藥以收之此因迫汗津液既亡無液可斂故去芍藥加龍骨牡蠣者是取其咸以補心重以鎮怯澀以固脫故曰救逆也且去芍藥之酸則肝家得辛甘之補加龍骨牡蠣之咸腎家既有既濟之力此虛則補母之法又五行承製之理矣蜀漆未詳昔云常山之苗則謬桂枝甘草龍骨牡蠣湯火逆又下之因燒針而煩躁即驚狂之漸也急用桂枝甘草以安神加龍骨牡蠣以救逆比前方簡而切當近世治傷寒者無火尉之法而病傷寒者多煩躁驚狂之變大抵用白虎承氣輩作有餘治之然此症屬實熱者固多而屬虛寒者間有則溫補安神之法不可廢也更有陽盛陰虛而見此症者當用炙甘草加減用棗仁遠志茯苓當歸等味又不可不知桂枝附子湯桂枝附子甘草生薑大棗桂枝附子去桂加白朮湯治傷寒八九日風濕相搏身體煩疼不能轉側不嘔不渴脈浮虛而澀者若其人大便硬小便自利去桂加白朮按桂枝附子湯即桂枝去芍藥加附子湯也彼治下後脈促胸滿而微惡寒是病在半表仍當是桂枝為君加附子為佐此風寒濕相合而相搏於表當從君君臣臣之制則桂附並重可知舊本兩方分兩相同誤亦甚矣夫脈浮為風澀為虛浮而澀則知寒之不去而濕之相承也風寒濕三氣合至合而成痹故身體煩疼而不能轉側病只在表而不在內桂枝能驅風散寒而勝濕故重其分兩配附子之辛熱率甘草薑棗以主之三氣自平營衛以和矣若其人又兼裡氣不和大便反硬小便反利者此非胃家實乃脾家虛也蓋脾家實腐穢當自去此濕流肌肉因脾土失職不能制水故大便反見燥化不嘔不渴是上焦之化源清故小便自利濡濕之地風氣常存故風寒相搏而不解耳病本在脾法當培土以勝濕而風寒自解故君白朮以代桂枝白朮專主健脾脾虛則濕勝而不運濕流於內故使大便不實濕流於表更能使大便不濡脾健則能制水水在內能使下輸膀胱而大便實水在外能使還入胃中而大便濡故方末云初服其人身如痹三服盡其人如冒狀此以朮附並走皮肉逐水氣未得除故使然耳法當加桂四兩此本一方二法以大便硬小便自利去桂也以大便不硬小便不利當加桂因桂枝治上焦大便硬小便利是中焦不治故去桂服湯已濕反入胃故大便不硬小便不利是上焦不治故仍須加桂蓋小便由於上焦之氣化而後膀胱之藏者能出也內經曰風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹此身痛而不能轉側是風少而寒濕勝必賴附子雄壯之力以行痹氣之著然附子治在下焦故必同桂枝始能令在表之痹氣散同白朮又能令在表之痹氣內行故桂枝附子湯是上下二焦之表劑去桂加白朮湯是中下二焦之表劑附子白朮湯仍加桂枝是通行三焦之表劑也是又一方三法也世以仲景方法分兩動稱一百一十三方三百九十七法不知從何處而起甘草附子湯甘草附子白朮桂枝治風濕相搏骨節疼痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者此即桂枝附子湯加白朮去薑棗者也前症得之傷寒有表無里此症因於中風故兼見汗出身腫之表短氣小便不利之裡此內經所謂風氣勝者為行痹之症也然上焦之化源不清總因在表之風濕相搏故於前方仍重用桂枝而少減朮附去薑棗者以其短氣而辛散濕泥之品非所宜耳大陷胸丸大黃芒硝杏仁葶藶甘遂大陷胸湯大黃芒硝甘遂病發於陽而反下之邪入於胃中與不得為汗之水氣結而不散心中硬痛因名結胸然結胸一症有隻在太陽部分者有並病陽明者此或丸或湯有輕重緩急之不同也結在太陽部分者身無大熱但頭汗出項亦強如柔痓狀寸脈浮關脈沉是病在上焦因氣之不行致水之留結耳夫胸中者太陽之都會宗氣之所主故名氣海太陽為諸陽主氣氣為水母氣清則水精四布氣熱則水濁而壅瘀矣此水結因於氣結用杏仁之苦溫以開胸中之氣氣降則水下矣氣結因於熱邪用葶藶之大寒以清氣分之熱源清而流潔矣水結之所必成窠臼甘遂之苦辛所以直達其窠臼也然太陽之氣化不行於胸中則陽明之胃府亦因熱而成實必假大黃芒硝小其制而為丸和白蜜以緩之使留戀於胸中過一宿乃下即解心胸之結滯又保腸胃之無傷此太陽里病之下法是以攻劑為和劑者也其並病陽明者因水結於胸上焦不通則津液不下無以潤腸胃故五六日不大便因而舌乾口渴日晡潮熱是陽明亦受病矣心下至小腹硬滿而痛不可近脈沉緊者此水邪結於心胸而熱邪實於腸胃用甘遂以浚太陽之水硝黃以攻陽明之實湯以蕩之是為兩陽表裡之下法也二方比大承氣更峻治水腫痢疾之初起者甚捷然必視其人之壯實者施之如平素虛弱或病後不任攻伐者當念虛虛之禍小陷胸湯黃連半夏栝蔞實熱入有淺深結胸分大小心腹硬痛或連小腹不可按者為大結胸此土燥水堅故脈亦應其象而沉緊止在心下不及胸腹按之知痛不甚硬者為小結胸是水與熱結凝滯成痰留於膈上故脈亦應其象而浮滑也穢物據清陽之位法當瀉心而滌痰用黃連除心下之痞實半夏消心下之痰結寒溫並用溫熱之結自平栝蔞實色赤形圓中含津液法象於心用以為君助黃連之苦且以滋半夏之燥洵為除煩滌痰開結寬胸之劑雖同名陷胸而與攻利水穀之方懸殊矣大小青龍攻太陽之表有水火之分大小陷胸攻太陽之裡有痰飲之別不獨以輕重論也生薑瀉心湯人參甘草黃連黃芩乾薑半夏生薑大棗此小柴胡湯去柴胡加乾薑黃連又即黃連湯去桂易芩傷寒汗出外已解胃中不和心下痞硬乾嘔食臭脅下有水氣腹中雷鳴下利者是陽不足而陰乘之也凡外感風寒而陽盛者汗出不解多轉屬陽明而成胃實此心下痞硬而下利者病雖在胃不是轉屬陽明下利不因誤下腸鳴而不滿痛又非轉屬太陰矣夫心為陽中太陽則心下是太陽之宮城而心下痞是太陽之裡也君主之火用不宣汗出不徹內之水氣不得越水氣不得散所以痞硬邪熱不殺穀故乾嘔食臭脅下為少陽之位太陽之陽氣不盛少陽之相火不支故水氣得支脅下土虛不能制水水氣從脅入胃泛溢中州故腹中雷鳴而下利也病勢已在腹中病根猶在心下總因寒熱交結於內以致胃中不和若用熱散寒則熱勢猖獗用寒攻熱則水勢橫行法當寒熱並舉攻補兼施以和胃氣故用芩連除心下之熱乾薑散心下之痞生薑半夏去脅下之水參甘大棗培腹中之虛因太陽之病為在裡故不從標本從乎中治也且芩連之苦必得乾薑之辛始能散痞人參得甘棗之甘協以保心又君生薑佐半夏全以辛散甘苦之樞而水氣始散名曰瀉心實以安心也此與十棗症皆表解而里不和見心下痞硬乾嘔下利然後因於中風之陽邪故外症尚有餘熱是痞硬下利屬於熱故可用苦寒峻利之劑以直攻之此因於傷寒之陰邪故內症反有郁逆是痞硬下利屬於虛故當用寒溫兼補之劑以和解之是治病各求其本也按瀉心本名理中黃連人參湯此以病在上焦故名瀉心耳世徒知膀胱為太陽之裡熱入膀胱為犯本不知心下痞硬為犯本因有傳足不傳手之謬甘草瀉心湯甘草黃連黃芩乾薑半夏大棗傷寒中風初無下症下之利日數十行完穀不化腹中雷鳴其人胃氣素虛可知則心下痞硬而滿非有形之結熱以胃中空虛客氣上逆於胃口故乾嘔心煩不得安所云當汗不汗其人心煩耳若認為實熱而復下之則痞益甚矣本方君甘草者一以瀉心而除煩一以補胃中之空虛一以緩客氣之上逆也倍加乾薑者本以散中宮下藥之寒且以行芩連之氣而消痞硬佐半夏以除嘔協甘草以和中是甘草得位而三善備乾薑任重而四美具矣中虛而不用人參者以未經發汗熱不得越上焦之餘邪未散與用小柴胡湯有胸中煩者去人參同一例也乾嘔而不用生薑者以上焦之津液已虛無庸再散耳此病已在胃亦不曰理中仍名瀉心者以心煩痞硬病在上焦猶未離乎太陽也心煩是太陽里症即是陽明之表症故雖胃中空虛完穀不化而不用人參因心煩是胃實之根太陽轉屬陽明之捷路也凡傷寒中風下利清穀屬於寒下利完穀屬於熱內經所云暴注下迫屬於熱者是也仲景之去人參預以防胃家之實歟半夏瀉心湯半夏乾薑黃連黃芩人參甘草大棗本論云嘔而發熱者小柴胡主之即所云傷寒中風有柴胡證但見一症即是不必悉具者是也又云嘔多雖有陽明證不可攻之可見少陽陽明合病闔從樞轉故不用陽明之三承氣當從少陽之大柴胡上焦得通則津液得下故大柴胡為少陽陽明之下藥也若傷寒五六日嘔而發熱是柴胡湯證而以他藥下之樞機廢弛變症見矣少陽居半表半裡之位其症不全發陽不全發陰故下後變症偏於半表者熱入而成結胸偏於半里者熱結心下而成痞也結胸與痞同為硬滿之症當以痛為辨滿而硬痛為結胸熱實大陷胸下之則痛隨利減如滿而不痛者為虛熱痞悶宜清火散寒而補虛蓋瀉心湯方即小柴胡去柴胡加黃連乾薑湯也不往來寒熱是無半表症故不用柴胡痞因寒熱之氣互結而成用黃連乾薑之大寒大熱者為之兩解且取其苦先入心辛以散邪耳此痞本於嘔故君以半夏生薑能散水氣乾薑善散寒氣凡嘔後痞硬是上焦津液已干寒氣留滯可知故去生薑而倍乾薑痛本於心火內郁故仍用黃芩佐黃連以瀉心也乾薑助半夏之辛黃芩協黃連之苦痞硬自散用參甘大棗者調既傷之脾胃且以壯少陽之樞也內經曰腰以上為陽故三陽俱有心胸之病仲景立瀉心湯以分治三陽在太陽以生薑為君者以未經誤下而心下成痞雖汗出表解水氣猶未散故微寓解肌之義也在陽明用甘草為君者以兩番妄下胃中空虛其痞益甚故倍甘草以建中而緩客邪之上逆是亦從乎中治之法也在少陽用半夏為君者以誤下而成痞邪已去半表則柴胡湯不中與之又未全入里則黃芩湯亦不中與之矣未經下而胸脅苦滿是里之表症用柴胡湯解表心下滿而胸脅不滿是里之半里症故制此湯和里稍變柴胡半表之治推重少陽半里之意耳名曰瀉心實以瀉膽也大黃黃連瀉心湯附子瀉心湯附子大黃黃連黃芩治心下痞按之濡其脈關上浮者用大黃黃連瀉心湯心下痞而復惡寒汗出者用附子瀉心湯此皆攻實之劑與前三方名雖同而法不同矣濡者濕也此因妄下汗不得出熱不得越結於心下而成痞胃火熾於內故心下有汗而按之者知其濡濕耳結胸症因症發於陽熱邪留於上焦故其寸脈獨浮而但頭汗出余處無汗此心下痞因症發於陰熱邪已蓄於中焦故其脈獨關上浮而汗但出於心下心下者胃口之氣尺寸不浮而關上獨浮此浮為胃實外見之徵不得責之浮為在表矣子能令母實故心下之痞不解母實而兼瀉其子是又治太陽陽明並病之一法也云瀉心者瀉其實耳熱有虛實客邪內陷為實藏氣自病為虛黃連苦燥但能解離宮之虛火不能除胃家之實邪非君大黃之勇以蕩滌之則客邪協內實而據心下者漫無出路故用一君一臣以麻沸湯漬其汁乘其鋭氣而急下之除客邪須急也夫心下痞而大便硬者是熱結於中當不惡寒而反惡寒當心下有汗而余處皆無汗若惡寒已罷因痞而復惡寒初無汗今痞結而反出汗是傷寒之陰邪不得散而兩陽之熱邪不得舒相搏於心下而成痞也法當佐以附子炮用而別煮以溫其積寒三物生用而取汁欲急於除熱寒熱各制而合服之是又於偶方中用反佐之奇法也夫結熱不速去必成胃家之燥實心下痞不散必轉成為大結胸此二方用麻沸湯之意歟仲景瀉心無定法正氣奪則為虛痞雜用甘補辛散苦泄寒溫之品以和之邪氣盛則為實痞用大寒大熱大苦大辛之味以下之和有輕重之分下有寒熱之別同名瀉心而命劑不同如此然五方中諸藥味數分兩各有進退加減獨黃連定而不移者以其苦先入心中空外堅能疏通諸藥之寒熱故為瀉心之主劑旋覆代赭湯旋覆代赭人參甘草半夏生薑大棗傷寒發汗若吐若下表解後心下痞硬噫氣不除者此心氣大虛餘邪結於心下心氣不得降而然也心為君主寒為賊邪表寒雖解而火不得位故使閉塞不通而心下痞硬君主不安故噫氣不除耳此方乃瀉心之變劑以心虛不可復瀉心故去芩連乾薑輩苦寒辛熱之品心為太陽通於夏氣旋覆花開於夏咸能補心而軟痞硬半夏根成於夏辛能散結氣而止噫二味得夏氣之全故用之以通心氣心本苦緩此為賊邪傷殘之後而反苦急故加甘草以緩之心本欲收今因餘邪留結而反欲散故倍生薑以散之虛氣上逆非得金石之重為之鎮墜則痞硬不能遽消而噫氣無能頓止代赭秉南方之赤色入通於心堅可除痞重可除噫用以為佐急治其標也人參大棗補虛於餘邪未平之時預治其本也扶正驅邪神自安若用芩連以瀉心能保微陽之不滅哉旋覆半夏作湯調代赭末治頑痰結於胸膈或涎沫上湧者最佳挾虛者加人參甚效乾薑黃連黃芩人參湯治傷寒吐下後食入口即吐此寒邪格熱於上焦也雖不痞硬而病本於心故用瀉心之半乾薑以散上焦之寒芩連以清心下之熱人參以通格逆之氣而調其寒熱以至和平去生薑半夏者胃虛不堪辛散不用甘草大棗者嘔不宜甘也凡嘔家夾熱者不利於香砂桔半服此方而晏如妄汗後水藥不得入口是為水逆妄吐下後食入口即吐是為食格此肺氣胃氣受傷之別也入口即吐不使少留乃火炎上之象故苦寒倍於辛熱不名瀉心者以瀉心湯專為痞硬之法耳要知寒熱相結於心下而成痞硬寒熱相阻於心下而成格逆源同而流異也赤石脂禹餘糧湯下後下利不止與理中湯而痢益甚者是胃關不固下焦虛脫也夫甘薑參術可以補中宮大氣之虛而不足以固大腸脂膏之脫故利在下焦者概不得以理中之理收功矣夫大腸之不固仍責在胃關門之不閉仍責在脾土虛不能制水仍當補土然芳草之氣稟甲乙之化土之所畏必擇夫稟戊土之化者以培土而制水乃克有成石者土之剛也二石皆土之精氣所結味甘歸脾氣衝和而性凝靜用以固堤防而平水土其功勝於草木耳且石脂色赤入丙助火以生土餘糧色黃入戊實胃而澀腸用以治下焦之標實以培中宮之本也此症土虛而火不虛故不宜於薑附本條云復利不止者當利其小便可知與桃花湯異局矣凡下焦虛脫者以二物為本參湯調服最效抵當湯丸水蛭大黃虻蟲桃仁太陽病六七日而表症仍在陽氣重可知脈當大而反微當浮而反沉沉為在裡當作結胸之症反不結胸是病不在上焦諸微無陽而其人反發狂者是病不在氣分矣凡陽病者上行極而下是熱在下焦可知下焦不治少腹硬滿是熱結於膀胱當有癃閉之患而小便反利者是上焦肺家之氣化行經絡之營氣不利也人知內熱則小便不通此熱結膀胱而小便反利當知小便由肺氣矣凡陽盛者陰必虛氣勝者血必病瘀熱內結於膀胱營血必外溢於經絡營氣傷故脈微而沉瘀血蓄故少腹硬滿血瘀不行心不得主肝無所藏神魂不安故發狂或身黃而脈沉結者皆由營氣不舒故也只以小便之自利決之則病在血分而不謬矣夫瘀血不去則新血不生營氣不流則五臟不通而死可立待岐伯曰血清氣澀疾瀉之則氣竭焉血濁氣澀疾瀉之則經可通也非得至峻之劑不足以抵其巢穴而當此重任矣水蛭蟲之巧於飲血者也虻飛蟲之猛於吮血者也茲取水陸之善取血者攻之同氣相求耳更佐桃仁之推陳致新大黃之苦寒以蕩滌邪熱名之曰抵當者謂直抵其當攻之所也若雖熱而未狂小腹滿而未硬宜小其制為丸以緩治之若外證已解少腹結急而滿人如狂者是轉屬陽明也用桃仁桂枝於調胃承氣湯中以微利之胃和則愈矣或問血得熱則行此何以反結膀胱熱則小便不通此何以反利乎答曰衝脈為血海而位居少腹之上膀胱居小腹之極底膀胱熱而血多則血自下而不蓄膀胱熱而血少則血凝而結於少腹矣水入於胃上輸脾肺下輸膀胱膀胱為州都之官全藉脾肺氣化而津液得出此熱在下焦上中二焦之氣化不病故小便自利也膀胱不利為癃由太陰之不固不約為遺溺由太陰之不攝仲景制大青龍大柴胡白虎湯治三陽無形之熱結三承氣之熱實是糟粕為患桃仁抵當之實結是蓄血為眚在有形中又有氣血之分也凡仲景用硝黃是蕩熱除穢不是除血後人專以氣分血分對講誤認糟粕為血竟推大黃為血分藥不知大黃之芳香所以開脾氣而去腐穢故方名承氣耳若不加桃仁豈能破血非加蛭虻何以攻堅是血劑中又分輕重也凡癥瘕不散久而成形者皆蓄血所致今人不求其屬而治之反用三稜等氣分之藥重傷元氣元氣日衰邪氣易結蓋謂糟粕因氣行而除瘀血因氣傷而反堅也明知此理則用抵當丸得治癥瘕及追蟲攻毒之效按水蛭賦體最柔秉性最險暗竊人血而人不知若飲水而誤吞之留戀胃中消耗血液腹中或痛或不痛令人黃瘦而死觀牛肚中有此者必瘦可類推矣虻蟲之體能高飛而遠舉專吮牛血其形氣猛於蒼蠅觀蒼蠅取人血汗最痛誤食入胃即刻腹痛必瀉出而後止可知飛蟲為陽屬專取營分之血不肯停留胃中與昆蟲之陰毒不同也仲景取虻蛭同用使蛭亦不得停留胃中且更有大黃以蕩滌之毒物與蓄血俱去而無遺禍然二物以毒攻毒者也若非邪氣固結元氣不虛者二物不可輕用矣上共四十六方其桂枝加葛根葛根加半夏等最為易曉故不具論如四逆真武等劑乃太陽所借用其方論各歸本位經論列於後
