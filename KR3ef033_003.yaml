body:
  text: 卷下陽明方總論陽明之病在胃實當以下為正法矣然陽明居中諸病咸臻故治法悉具如多汗無汗分麻黃桂枝在胸在腹分瓜蒂梔豉初硬燥堅分大小承氣即用汗吐下三法亦有輕重淺深之不同也若大煩大渴而用白虎瘀血發黃而用茵陳小便不利而用豬苓停飲不散而用五苓食谷欲吐而用茱萸等法莫不各有差等以棋喻之發汗是先著湧吐是要著清火是穩著利水是閒著溫補是忿著攻下是末著病至於攻下無彆著矣故汗之得法他著都不必用其用吐法雖是奇著已是第二手矣他著都非正著惟攻下為煞著亦因從前之失著也然諸法皆因清火而設則清火是陽明之上著與梔子豆豉湯梔子甘草豆豉湯梔子生薑豆豉湯梔子厚朴湯梔子厚朴枳實梔子乾薑湯梔子柏皮湯梔子柏皮甘草此陽明半表裡湧泄之和劑也少陽之半表是寒半里是熱而陽明之熱自內達外有熱無寒故其外症身熱汗出不惡寒反惡熱身重或目痛鼻乾不得眠其內症咽燥口苦舌苔煩躁渴欲飲水心中懊憹腹滿而喘此熱半在表半在裡也脈雖浮緊不得為太陽病非汗劑所宜又病在胸腹而未入胃府則不當下法當湧泄以散其邪梔子苦能泄熱寒能勝熱其形象心又赤色通心故主治心中上下一切症豆形象腎又黑色入腎制而為豉輕浮上行能使心腹之濁邪上出於口一吐而心腹得舒表裡之煩熱悉除矣所以然者二陽之病發心脾以上諸症是心熱不是胃家熱即本論所云有熱屬臟者攻之不令發汗之謂也若夫熱傷氣者少氣加甘草以益氣虛熱相搏者多嘔加生薑以散邪此可為夾虛者立法也若素有宿食者加枳實以降之地道不通者加大黃以潤之此可為實熱者立法也叔和用以治太陽瘥後勞復之症誤甚矣如妄下後而心煩腹滿起臥不安者是熱已入胃便不當吐故去香豉心熱未解不宜更下故只用梔子以除煩佐枳朴以泄滿此兩解心腹之妙是小承氣之變局也或以丸藥下之心中微煩外熱不去是知寒氣留中而上焦留熱故任梔子以除煩用乾薑逐內寒以散表熱此甘草瀉心之化方也若因於傷寒而肌肉發黃者是寒邪已解而熱不得越當兩解表裡之熱故用梔子以除內煩柏皮以散外熱佐甘草以和之是又茵陳湯之輕劑矣此皆梔豉湯加減以御陽明表症之變幻者夫梔子之性能屈曲下行不是上湧之劑惟豉之腐氣上熏心肺能令人吐耳觀瓜蒂散必用豉汁和服是吐在豉而不在梔矣觀梔子乾薑湯去豉用姜是取其橫散梔子厚朴湯以枳朴易豉是取其下泄皆不欲上越之義舊本二方後俱云得吐止後服豈不謬哉觀梔子柏皮湯與茵陳湯方中俱有梔子俱不言吐又病人舊微溏者不可與則梔子之性自明矣瓜蒂散瓜蒂赤小豆香豉此陽明湧泄之峻劑治邪結於胸中者也胸中為清虛之府三陽所受氣營衛所由行寒邪凝結於此胃氣不得上升內熱不得外達以致痞硬其氣上衝咽喉不得息者此寒格於上也寸脈微浮寒束於外也此寒不在營衛非汗法所能治因得酸苦湧泄之品因而越之上焦得通中氣得達胸中之陽氣復肺氣之治節行痞硬可得而消也瓜蒂色青象東方甲木之化得春升生髮之機能提胃中陽氣以除胸中之寒熱為吐劑中第一品然其性走而不守與梔子之守而不走者異故必得穀氣以和之赤小豆形色象心甘酸可以保心氣黑豆形色象腎性本沉重黴熟而使輕浮能令腎家之精氣交於心胃中之濁氣出於口作為稀糜調服二味雖快吐而不傷神奏功之捷勝於汗下矣前方以梔子配豉此方以赤豆配豉皆以形色取其心腎合交之義若夫心中溫溫欲吐復不吐始得之手足寒脈弦遲者以不腹滿不得為太陰病但以欲寐而知其為少陰病不在上焦而在胸中亦有可吐之理矣夫病在少陰當補無瀉而亦有可吐可下之法者以其實也實在胸中可吐實在胃府當下此皆少陰陽明合併之病是吐下二法仍屬陽明也如病人手足厥冷脈乍緊心下滿而煩飢不能食者是厥陰陽明合病病本發於厥陰而實邪結於陽位急則治其標亦當從陽明湧吐之法矣余義見制方大法甘草乾薑湯芍藥甘草湯二方為陽明半表半裡症誤服桂枝之變症而設也桂枝湯本為中風自汗而設若陽明病汗出多微惡寒而無里症者為表未解故可用桂枝湯發汗其脈遲猶中風之緩與脈浮而弱者同義若但浮之脈在太陽必無汗在陽明必盜汗出則傷寒之脈浮而自汗出者是陽明之熱淫於內而非太陽之浮為在表矣心煩是邪中於膺心脈絡小腸心煩則小腸亦熱故小便數微惡寒而腳攣急知惡寒將自罷趺陽脈因熱甚而血虛筋急故腳攣也此病在半表半裡服梔豉湯而可愈反用桂枝攻表汗多所以亡陽胃脘之陽不至於四肢故厥虛陽不歸其部故咽中乾嘔吐逆而煩躁也勢不得不用熱因熱用之法救桂枝之誤以回陽然陽亡實因於陰虛而無所附又不得不用益津斂血之法以滋陰故與甘草乾薑湯而厥愈更與芍藥甘草湯腳伸矣且芍藥酸寒可以止煩斂自汗而利小便甘草甘平可以解煩和肝血而緩筋急是又內調以解外之一法也仲景回陽每用附子此用乾薑甘草者正以見陽明之治法夫太陽少陰所謂亡陽者先天之元陽也故必用附子之下行者回之從陰引陽也陽明所謂亡陽者後天胃脘之陽也取甘草乾薑以回之從乎中也蓋桂枝之性辛散走而不守即佐以芍藥尚能亡陽乾薑之味苦辛守而不走故君以甘草便能回陽然先天太少之陽不易回回則諸症悉解後天陽明之陽雖易回既回而前症仍在變症又起故更作芍藥甘草湯繼之蓋脾主四肢胃主津液陽盛陰虛脾不能為胃行津液以灌四旁故足攣急用甘草以生陽明之津芍藥以和太陰之液其腳即伸此亦用陰和陽法也或因薑桂之遺熱致胃熱而譫語少與調胃承氣以和之仗硝黃以對待薑桂仍不失為陽明從乎中治之法只以兩陽合明之位氣血俱多之經故不妨微寒之而微利之與他經亡陽調理不同耳甘草乾薑湯得理中之半取其守中不須其補中芍藥甘草湯減桂枝之半用其和里不取其攻表是仲景加減法之隱而不宣者白虎加人參湯石膏知母甘草粳米人參外邪初解結熱在裡表裡俱熱脈洪大汗大出大煩大渴欲飲水數升者是陽明無形之熱此方乃清肅氣分之劑也蓋胃中糟粕燥結宜苦寒壯水以奪土若胃口清氣受傷宜甘寒瀉火而護金要知承氣之品直行而下泄如胃家未實而下之津液先亡反從火化故妄下之後往往反致胃實之眚內經所謂味過於苦脾氣不濡胃氣反厚者是已法當助脾家之濕土以制胃家燥火之上炎經曰甘先入脾又曰以甘瀉脾又曰脾氣散津上歸於肺是甘寒之品乃土中瀉火而生津液之上劑也石膏大寒寒能勝熱味甘歸脾性沉而主降已備秋金之體色白通肺質重而含津已具生水之用知母氣寒主降味辛能潤泄肺火而潤腎燥滋肺金生水之源甘草土中瀉火緩寒藥之寒用為舟楫沉降之性始得留連於胃粳米稼穡作甘培形氣而生津血用以奠安中宮陰寒之品無傷脾損胃之慮矣飲入於胃輸脾歸肺水精四布煩渴可除也更加人參者以氣為水母邪之所湊其氣必虛陰虛則無氣此大寒劑中必得人參之力以大補真陰陰氣復而津液自生也若壯盛之人元氣未傷津液未竭不大渴者只須滋陰以抑陽不必加參而益氣若元氣已虧者但用純陰之劑火去而氣無由生惟加人參則火瀉而土不傷又使金能得氣斯立法之盡善歟此方重在煩渴是熱已入里若傷寒脈浮發熱無汗惡寒表不解者不可與若不惡寒而渴者雖表未全解如背微惡寒時惡風者亦用之若無汗煩渴而表不解者是麻黃杏子甘草石膏症若小便不利發熱而渴欲飲水者又五苓豬苓之症矣若太陽陽明之瘧熱多寒少口燥舌乾脈洪大者雖不得汗用之反汗出而解陶氏以立夏後立秋前天時不熱為拘誤人最甚烏知方因症立非為時用藥也竹葉石膏湯竹葉石膏人參甘草半夏麥冬粳米此加減人參白虎湯也三陽合病脈浮大在關上但欲睡而不得眠合目則汗出宜此主之若用於傷寒解後虛羸少氣氣逆欲吐者則謬之甚矣三陽合病者頭項痛而胃家實口苦咽乾目眩者是也夫脈浮為陽大為陽是三陽合病之常脈今在關上病機在肝胃兩部矣凡胃不和則臥不安如肝火旺則上走空竅亦不得睡夫腎主五液入心為汗血之與汗異名同類是汗即血也心主血而肝藏血人臥則血歸於肝目合即汗出者肝有相火竅閉則火無從泄血不得歸肝心不得主血故發而為汗此汗不由心故名之為盜汗耳此為肝眚故用竹葉為引導以其秉東方之青色入通於肝大寒之氣足以瀉肝家之火用麥冬佐人參以通血脈佐白虎以回津所以止盜汗耳半夏稟一陰之氣能通行陰之道其味辛能散陽蹺之滿用以引衛氣從陽入陰陰陽通其臥立至其汗自止矣其去知母者何三陽合病而遺尿是肺氣不收致少陰之津不升故藉知母以上滋手太陰知母外皮毛而內白潤肺之潤藥也此三陽合病而盜汗出是肝火不寧令少陰之精妄泄既不可復濡少陰之津又不可再泄皮毛之澤故用麥冬以代之歟茵陳蒿湯茵陳梔子大黃太陽陽明俱有發黃症但頭汗而身無汗則熱不外越小便不利則熱不下泄故瘀熱在裡而渴飲水漿然黃有不同症在太陽之表當汗而發之故用麻黃連翹赤豆湯為涼散法症在太陽陽明之間當以寒勝之用梔子柏皮湯乃清火法症在陽明之裡當瀉之於內故立本方是逐穢法茵陳秉北方之色經冬不凋傲霜凌雪歷遍冬寒之氣故能除熱邪留結佐梔子以通水源大黃以除胃熱令瘀熱從小便而泄腹滿自減腸胃無傷仍合引而竭之之義亦陽明利水之奇法也仲景治陽明渴飲有四法本太陽轉屬者五苓散微發汗以散水氣大煩燥渴小便自利者白虎加參清火而生津脈浮發熱小便不利者豬苓湯滋陰而利水小便不利腹滿者茵陳湯以泄滿令黃從小便出病情不同治法亦異矣竊思仲景利小便必用化氣之品通大便必用承氣之味故小便不利者必加茯苓甚者兼用豬苓因二苓為化氣之品而小便由於氣化矣此小便不利不用二苓者何本論之陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓復利小便故也斯知陽明病汗出多而渴者不可用則汗不出而渴者津液先虛更不可用明矣故以推陳致新之茵陳佐以屈曲下行之梔子不用枳朴以承氣與芒硝之峻利則大黃但可以潤胃燥而大便之遽行可知故必一宿而腹始減黃從小便去而不由大腸仲景立法神奇匪伊所思耳大承氣湯大黃芒硝枳實厚朴小承氣湯大黃枳實厚朴治陽明實熱地道不通燥屎為患其外症身熱汗出不惡寒反惡熱日晡潮熱手足濈濈汗出或不了了其內症六七日不大便初欲食反不能食腹脹滿繞臍痛煩躁譫語發作有時喘冒不得臥腹中轉矢氣或咽燥口乾心下痛自利純清水或汗吐下後熱不解仍不大便或下利譫語其脈實或滑而數者大承氣湯主之如大便不甚堅硬者小承氣湯微和之如大便燥硬而證未劇者調胃承氣湯和之若汗多微發熱惡寒未罷腹未滿熱不潮屎未堅硬初硬後溏其脈弱或微滿者不可用夫諸病皆因於氣穢物之不去由於氣之不順故攻積之劑必用行氣之藥以主之亢則害承乃制此承氣之所由又病去而元氣不傷此承氣之義也夫方分大小有二義焉厚朴倍大黃是氣藥為君名大承氣大黃倍厚朴是氣藥為臣名小承氣味多性猛制大其服欲令泄下也因名曰大味少性緩制小其服欲微和胃氣也故名曰小二方煎法不同更有妙義大承氣用水一斗先煮枳朴煮取五升內大黃煮取三升內硝者以藥之為性生者鋭而先行熟者氣純而和緩仲景欲使芒硝先化燥屎大黃繼通地道而後枳朴除其痞滿緩於製劑者正以急於攻下也若小承氣則三物同煎不分次第而服只四合此求地道之通故不用芒硝之峻且遠於大黃之鋭矣故稱為微和之劑調胃承氣湯大黃芒硝甘草此治太陽陽明並病之和劑也因其人平素胃氣有餘故太陽病三日其經未盡即欲再作太陽經發汗而外熱未解此外之不解由於里之不通故太陽之頭項強痛雖未除而陽明之發熱不惡寒已外見此不得執太陽禁下之一說坐視津液之枯燥也少與此劑以調之但得胃氣一和必自汗而解是與針足陽明同義而用法則有在經在腑之別矣不用氣藥而亦名承氣者調胃即所以承氣也經曰平人胃滿則腸虛腸滿則胃虛更虛更實故氣得上下今氣之不承由胃家之熱實必用硝黃以濡胃家之糟粕而氣得以下同甘草以生胃家之津液而氣得以上推陳之中便寓致新之義一攻一補調胃之法備矣胃調則諸氣皆順故亦得以承氣名之前輩見條中無燥屎字便云未堅硬者可用不知此方專為燥屎而設故芒硝分兩多於大承氣因病不在氣分故不用氣藥耳古人用藥分兩有輕重煎服有法度粗工不審其立意故有三一承氣之說豈知此方全在服法之妙少少服之是不取其勢之鋭而欲其味之留中以濡潤胃腑而存津液也所云太陽病未罷者不可下又與若欲下之宜調胃承氣湯合觀之治兩陽並病之義始明矣白虎加人參是於清火中益氣調胃用甘草是於攻實中慮虛桃仁承氣湯桃仁大黃芒硝甘草桂枝治太陽病不解熱結膀胱小腹急結其人如狂此蓄血也如表症已罷者用此攻之夫人身之經營於內外者氣血耳太陽主氣所生病陽明主血所生病邪之傷人也先傷氣分繼傷血分氣血交併其人如狂是以太陽陽明並病所云氣留而不行者氣先病也血壅而不濡者血後病也若太陽病不解熱結膀胱乃太陽隨經之陽熱瘀於裡致氣留不行是氣先病也氣者血之用氣行則血濡氣結則血蓄氣壅不濡是血亦病矣小腹者膀胱所居也外鄰衝脈內鄰於肝陽氣結而不化則陰血蓄而不行故少腹急結氣血交併則魂魄不藏故其人如狂治病必求其本氣留不行故君大黃之走而不守者以行其逆氣甘草之甘平者以調和其正氣血結而不行故用芒硝之咸以軟之桂枝之辛以散之桃仁之苦以泄之氣行血濡則小腹自舒神氣自安矣此又承氣之變劑也此方冶女子月事不調先期作痛與經閉不行者最佳蜜煎方豬膽汁經曰外者外治內者內治然外病必本於內故薛立齊於外科悉以內治故仲景於胃家實者有蜜煎膽導等法蜂蜜釀百花之英所以助太陰之開膽汁聚苦寒之津所以潤陽明之燥雖用甘用苦之不同而滑可去著之理則一也惟求地道之通不傷脾胃之氣此為小便自利津液內竭者設而老弱虛寒無內熱症者最宜之少陽方總論六經各有提綱則應用各有方法如太陽之提綱主表法當汗解而表有虛實之不同故立桂枝麻黃二法陽明提綱主胃實法當下解而實亦有微甚故分大小承氣少陽提綱有口苦咽乾目眩之症法當清火而火有虛實若邪在半表則制小柴胡以解虛火之遊行大柴胡以解相火之熱結此治少陽寒熱往來之二法若邪入心腹之半里則有半夏瀉心黃連黃芩等劑叔和搜採仲景舊論録其對症真方提防世急於少陽太陰二經不録一方因不知少陽證故不知少陽方耳小柴胡湯柴胡人參黃芩甘草半夏姜棗此為少陽樞機之劑和解表裡之總方也少陽之氣遊行三焦而司一身腠理之開閣血弱氣虛腠理開發邪氣因入與正氣相搏邪正分爭故往來寒熱與傷寒頭疼發熱而脈弦細中風兩無關者皆是虛火遊行於半表故取柴胡之輕清微苦微寒者以解表邪即以人參之微甘微溫者預補其正氣使裡氣和而外邪勿得入也其口苦咽乾目眩目赤頭汗心煩舌苔等症皆虛火遊行於半里故用黃芩之苦寒以清之即用甘棗之甘以緩之亦以提防三陰之受邪也太陽傷寒則嘔逆中風則乾嘔此欲嘔者邪正相搏於半里故欲嘔而不逆脅居一身之半為少陽之樞邪結於脅則樞機不利所以胸脅苦滿默默不欲食也引用薑半之辛散一以佐柴芩而逐邪一以行甘棗之泥滯可以止嘔者即可以泄滿矣夫邪在半表勢已向里未有定居故有或為之證所以方有加減藥無定品之可拘也若胸中煩而不嘔者去半夏人參恐其助煩也若煩而嘔者則人參可去而半夏不得不用矣加栝蔞實者取其苦寒降火而除煩也若渴者是元氣不足而津液不生去半夏之辛溫再加人參以益氣而生津液更加栝蔞根之苦寒者以升陰液而上滋也若腹中痛者雖相火為患恐黃芩之苦轉屬於太陰故易芍藥之酸以瀉木若邪結於脅下而痞硬者去大棗之甘能助滿加牡蠣之咸以軟堅也若心下悸小便不利者是為小逆恐黃芩之寒轉屬於少陰故易茯苓之淡滲而利水若內不渴而外微熱者是裡氣未傷而表邪未解不可補中故去人參加桂枝之辛散溫覆而取其微汗若咳者是相火迫肺不可益氣故去人參所謂肺熱還傷肺者此也凡發熱而咳者重在表故小青龍於麻桂細辛中加乾薑五味此往來寒熱而咳者重在裡故並去薑棗之和營衛者而加乾薑之苦辛以從治相火上逆之邪五味之酸以收肺金之氣也合而觀之但顧邪氣之散而正氣無傷此制小柴胡之意歟是方也與桂枝湯相仿而柴胡之解表遜於桂枝黃芩之清裡重於芍藥薑棗甘草微行辛甘發散之常而人參甘溫已示虛火可補之義且去滓再煎之法又與他劑不同粗工恐其閉住邪氣妄用柴芩而屏絶人參所以夾虛之症不能奏功反以速斃也按本方七味柴胡主表邪不解甘草主裡氣不調五物皆在進退之列本方若去甘草便名大柴胡若去柴胡便名瀉心黃芩黃連等湯矣前輩皆推柴胡為主治盧氏又以柴胡三生半冬配半夏為主治皆未審本方加減之義耳本方為脾家虛熱四時瘧疾之聖藥余義詳少陽病解制方大法大柴胡湯柴胡黃芩半夏芍藥枳實薑棗傷寒發熱汗出不解十餘日結熱在裡心下痞硬嘔吐下利復往來寒熱或妄下後柴胡證仍在與小柴胡湯嘔不止心下急鬱郁微煩者此皆少陽半表裡氣分之症此方是治三焦無形之熱邪非治胃腑有形之實邪也其心下急煩痞硬是病在胃口而不在胃中結熱在裡不是結實在胃因不屬有形故十餘日復能往來寒熱若結實在胃則蒸蒸而發熱不復知有寒矣因往來寒熱故倍生薑佐柴胡以解表結熱在裡故去參甘加枳芍以破結條中並不言及大便硬而且有下利症仲景不用大黃之意曉然後人因有下之二字妄加大黃以傷胃氣非大謬乎妄作傷寒書者總不知憑脈辨症以用藥專以併合仲景方為得意如加甘草於大承氣中而名三一承氣加柴芩芍藥於承氣中而名六一順氣以為可以代三承氣大柴胡大陷胸等湯竟不審仲景方分大小藥分表裡設方命劑當因病人病機變遷輕重耳豈聖賢之立方不精也須爾輩更改乎大小柴胡俱是兩解表裡之劑大柴胡主降氣小柴胡主調氣調氣無定法故小柴胡除柴胡甘草外皆可進退降氣有定局故大柴胡無加減法後人每方俱有加減豈知方者哉柴胡桂枝幹薑湯柴胡桂枝乾薑黃芩甘草牡蠣栝蔞根傷寒五六日發汗不解尚在太陽界反下之胸脅滿微結是系在少陽矣此微結與陽微結不同陽微結對純陰結言是指結實在胃此微結對大結胸言是指胸脅痞硬小便不利者因下後下焦津液不足也頭為三陽之會陽氣不得降故但頭汗出半表半裡之寒邪未解上下二焦之邪熱已甚故往來寒熱心煩耳此方全從柴胡加減心煩不嘔不渴故去半夏之辛溫加栝蔞根以生津胸脅滿而微結故減大棗之甘滿加牡蠣之咸以軟之小便不利而心下不悸是無水可利故不去黃芩不加茯苓雖渴而太陽之餘邪不解故不用參而加桂生薑之辛易乾薑之溫苦所以散胸脅之滿結也初服煩即微者黃芩栝蔞之效繼服汗出周身內外全愈者薑桂之功小柴胡加減之妙若無定法而實有定局矣更其名曰柴胡桂枝幹姜以柴胡證具而太陽之表猶未解里已微結須此桂枝解表乾薑解結以佐柴胡之不及耳柴胡桂枝湯柴胡桂枝人參甘草半夏黃芩芍藥大棗生薑柴胡二湯皆調和表裡之劑桂枝湯重解表而微兼清裡柴胡湯重和里而微兼散表此傷寒六七日正寒熱當退之時尚見發熱惡寒諸表症更兼心下支結諸里症表裡不解法當雙解之然惡寒微則發熱亦微可知支節煩疼則一身骨節不痛可知微嘔心下亦微結故謂之支結表症雖不去而已輕里症雖已見而未甚此太陽少陽並病之輕者故取桂枝之半以解太陽未盡之邪取柴胡之半以解少陽之微結凡口不渴身有微熱者當去人參此以六七日來邪雖不解而正氣已虛故用人參以和之也外症雖在而病機已見於里故方以柴胡冠桂枝之前為雙解兩陽之輕劑柴胡加龍骨牡蠣湯柴胡人參黃芩半夏生薑龍骨牡蠣桂枝鉛丹茯苓大黃大棗傷寒八九日不解陽盛陰虛下之應不為過而變症蜂起者是未講於調胃承氣之法而下之不得其術也胸滿而煩小便不利三陽皆有是症而驚是木邪犯心譫語是熱邪入胃一身盡重是病在陽明而無氣以動也不可轉側是關少陽而樞機不利也此為少陽陽明並病故取小柴胡之半以轉少陽之樞輔大黃之勇以開陽明之閣滿者忌甘故去甘草小便不利故加茯苓驚者須重以鎮怯鉛稟於金之體受癸水之氣能清上焦無形之煩滿中焦有形之熱結煉而成丹不特入心而安神且以入肝而滋血矣龍骨重能鎮驚而平木蠣體堅不可破其性守而不移不特靜可以鎮驚而寒可以除煩熱且咸能潤下佐茯苓以利水又能軟堅佐大黃以清胃也半夏引陽入陰能治目不瞑亦安神之品故少用為佐人參能通血脈桂枝能行營氣一身盡重不可轉側者在所必須故雖胸滿譫語而不去也此於柴胡方加味而取龍蠣名之者亦以血氣之屬同類相求耳黃連湯黃連人參甘草桂枝乾薑半夏大棗傷寒表不發熱而胸中有熱是其人未傷寒時素有蓄熱也熱在胸中必上形頭面故寒邪不得上干上焦實必中氣虛故寒邪得從脅而入胃內經云中於脅則入少陽此類是已凡邪在少陽法當柴胡主治此不往來寒熱病不在半表則柴胡不中與之胸中為君主之宮城故用半夏瀉心加減胸中之熱不得降故炎上而欲嘔胃因邪氣之不散故腹中痛也用黃連瀉心胸之熱薑桂祛胃中之寒甘棗緩腹中之痛半夏除嘔人參補虛雖無寒熱往來於外而有寒熱相搏於中所以寒熱並用攻補兼施仍不離少陽和解之治法耳此症在太陰少陽之間此方兼瀉心理中之劑黃芩湯黃芩芍藥甘草大棗太陽陽明合病是寒邪初入陽明之經胃家未實移寒於脾故自下利此陰盛陽虛與葛根湯辛甘發散以維陽也太陽少陽合病是熱邪陷入少陽之裡膽火肆逆移熱於脾故自下利此陽盛陰虛與黃芩湯苦甘相淆以存陰也凡太少合病邪在半表者法當從柴胡桂枝加減此則熱淫於內不須更顧表邪故用黃芩以泄大腸之熱配芍藥以補太陰之虛用甘棗以調中州之氣雖非胃實亦非胃虛故不必人參以補中也若嘔是上焦之邪未散故仍加薑夏此柴胡桂枝湯去柴桂人參方也凡兩陽之表病用兩陽之表藥兩陽之半表病用兩陽之半表藥此兩陽之裡病用兩陽之裡藥逐條細審若合符節然凡正氣稍虛表雖在而預固其里邪氣正盛雖下利而不須補中此又當著眼處內經熱病論云太陽主氣陽明主肉少陽主膽傷寒一日太陽二日陽明三日少陽冬不藏精則精不化氣故先氣病次及肉之病而及膽仍自外之內此病本雖因於內而病因為傷於寒故一病兩名耳膽汁最苦最寒乃相火中之真味火旺之水虧膽汁上溢而口苦故用芩連之品以滋膽汁而清相火也太陰方總論太陰主內為陰中至陰最畏虛寒用溫補以理中此正法也然太陰為開故太陰亦能中風則亦有可汗症若見四肢煩疼之表而脈浮者始可與桂枝湯發汗若表熱裡寒下利清穀是為中寒當用四逆以急救其里不可攻表以汗出必脹滿也又恐妄汗而腹脹滿故更製厚朴生薑甘草半夏人參湯以解之太陰本無下症因太陽妄下而腹滿時痛者是陽邪內陷故有桂枝加芍藥湯之下法若病不從太陽來而腹滿時痛是太陰本病倘妄下之必胸下結硬而成寒實結胸故更制三物白散以散之此仲景為太陰誤汗誤下者立救逆法也叔和不能分明六經之方治而專以汗吐下之三法教人重集諸可與不可與等浮泛之辭以混仲景切近的當之方法是點金成鐵矣理中丸人參白朮乾薑甘草太陰病以吐利腹滿痛為提綱是遍及三焦矣然吐雖屬上而由於腹滿利雖屬下而由於腹滿皆因中焦不治以致之也其來由有三有因表虛而風寒自外入者有因下虛而寒濕自下上者有因飲食生冷而寒邪由中發者總不出於虛寒法當溫補以扶胃脘之陽一理中而滿痛吐利諸症悉平矣故用白朮培脾土之虛人參益中宮之氣乾薑散胃中之寒甘草緩三焦之急也且乾薑得白朮能除滿而止吐人參得甘草能療痛而止利或湯或丸隨機應變此理中確為之主劑歟夫理中者理中焦此仲景之明訓且加減法中又詳其吐多下多腹痛滿等法而叔和録之於大病瘥後治真吐一症是坐井觀天者乎按太陰傷寒手足自溫者非病由太陽必病關陽明此陰中有陽必無吐利交作之患或暴煩下利或發黃便硬則腹滿腹痛是脾家實而非虛熱而非寒矣又當於茵陳調胃輩求之四逆湯乾薑附子甘草脈浮而遲表熱裡寒二句是立方之大旨脈浮為在表遲為在臟浮中見遲是浮為表虛遲為臟寒矣腹滿吐利四肢厥逆為太陰症薑附甘草本太陰藥諸條不冠以太陰者以此方為太陽並病立法也按四逆諸條皆是太陽壞病轉屬太陰之症太陽之虛陽留於表而不罷太陰之陰寒與外來之寒邪相得而益深故外症則惡寒發熱或大汗出身體痛四肢疼手足冷或脈浮而遲或脈微欲絶內症則腹滿腹脹下利清穀小便自利或吐利交作此陰邪猖獗真陽不歸故云逆也本方是用四物以救逆之謂非專治四肢厥冷而為名蓋仲景凡治虛症以補中為主觀協熱下利脈微弱者用人參汗後身疼脈沉遲者加人參此脈微欲絶下利清穀且不煩不咳中氣大虛元氣已虛若但溫不補何以救逆乎觀茯苓四逆之治煩躁且用人參其冠以茯苓而不及參則本方有參可知夫人參通血脈者也通脈四逆豈得無參是必因本方之脫落而仍之耳薛新甫用三生飲加人參兩許而駕馭其邪則仲景用生附安得不用人參以固其元氣耶叔和以太陰之吐利四逆混入厥陰不知厥陰之厥利是木邪剋土為實熱太陰之厥利是脾土自病屬虛寒徑庭自異若以薑附治相火豈不逆哉按理中四逆二方在白朮附子之別白朮為中宮培土益氣之品附子為坎宮扶陽生氣之劑故理中只理中州脾胃之虛寒四逆能佐理三焦陰陽之厥逆也後人加附子於理中名曰附子理中湯不知理中不須附子而附子之功不專在理中矣蓋脾為後天腎為先天少陰之火所以生太陰之土脾為五臟之母少陰更太陰之母與四逆之為劑重於理中也不知其義者謂生附配乾薑補中有發附子得生薑而能發散附子非乾薑則不熱得甘草則性緩是隻知以藥性上論寒熱攻補而不知於病機上分上下淺深也所以不入仲景之門也哉厚朴生薑半夏甘草人參湯此太陰調胃承氣之方也凡治病必分表裡而表裡偏有互呈之證如麻黃之喘桂枝之自汗大青龍之煩躁小青龍之咳皆病在表而夾里症也用杏仁以治喘芍藥以止汗石膏以治煩躁五味乾薑以治咳是於表劑中兼治里也若下利腹脹滿者太陰里症而兼身體疼痛之表症又有先溫其里後解其表之法若下利清穀而兼脈浮表實者又有隻宜治里不可攻表之禁是知仲景重內輕外之中更有淺深之別也夫汗為陽氣而腰以上為陽發汗只可散上焦營衛之寒不能治下焦臟腑之濕若病在太陰寒濕在腸胃而不在營衛故陰不得有汗妄發其汗則胃脘之微陽隨而達於表腸胃之寒濕入經絡而留於腹中下利或止而清穀不消所以汗出必脹滿也凡太陽汗後脹滿是陽實於裡將轉屬陽明太陰汗後而腹滿是寒實於裡而陽虛於內也邪氣盛則實故用厚朴薑夏散邪而除脹滿正氣奪則虛故用人參甘草補中而益元氣此亦理中之劑歟若用之於太陽汗後是抱薪救火如此症而妄作太陽治之如水益深矣三物白散桔梗貝母巴豆太陽表熱未除而反下之熱邪與水氣相結成實熱結胸太陰腹滿時痛而反下之寒熱相結成寒實結胸夫大小陷胸用苦寒之品者為有熱也此無熱症者則不得概以陽症之法治之矣三物小陷胸湯者即白散也以其結硬而不甚痛故亦以小名之以三物皆白欲以別於小陷胸之黃連故以白名之在太陽則或湯或丸在太陰則或湯或散隨病機之宜也貝母善開心胸鬱結之氣桔梗能提胸中陷下之氣然微寒之品不足以勝結硬之陰邪非巴豆之辛熱斬關而入何以使胸中之陰氣流行也故用二分之貝桔必得一分之巴豆以佐之則清陽升而濁陰降結硬斯可得而除矣和以白飲之甘取其留戀於胃不使速下散以散之比湯以蕩之者尤為的當也服之而病在膈上必吐在膈下者必利以本症原自吐利因胸下結硬而暫止耳今因其勢而利導之使還其出路則結硬自散也然此劑非欲其吐本欲其利亦不欲其過利故不利進熱粥一杯利過不止進冷粥一杯此又復方之妙理歟仲景每用粥為反佐者以草木之性各有偏長惟稼穡作甘為中和之味人之精神血氣皆賴之以生故桂枝湯以熱粥發汗理中湯以熱粥溫中此以熱粥導利復以冷粥止利神哉東垣云淡粥為陰中之陽所以利小便則利水之劑未始不可用也今人服大黃後用冷粥止利尚是仲景遺意乎此證叔和編在太陽篇中水潠病後云寒實結胸無熱症者與三物小陷胸湯白散亦可服按本論小陷胸湯是黃連栝蔞半夏三物而貝母桔梗巴豆亦是三物夫黃連巴豆寒熱天淵豈有可服黃連之症亦可服巴豆之理且此外更無別方則當云三物小陷胸湯為散亦可服如雲白散亦可服是二方矣而方後又以身熱皮粟一段雜之使人昏昏不辨今移之太陰胸下結硬之後其症其方若合符然麻仁丸杏仁芍藥枳殼厚朴大黃麻仁土為萬物之母者以其得和平之氣也濕土不能生草木然稻藕菱芡等物亦有宜於水者若燥土堅硬無水以和之即不毛之地矣凡胃家之實多因於陽明之熱結而亦有因太陰之不開者是脾不能為胃行其津液故名為脾約也承氣諸劑只能清胃不能扶脾如病在倉卒胃陽實而脾陰不虛用之則胃氣通而大便之開闔如故若無惡熱自汗煩躁脹滿譫語潮熱等症飲食小便如常而大便常自堅硬或數日不行或出之不利是謂之孤陽獨行此太陰之病不開而穢汙之不去乃平素之蓄積使然也慢而不治則飲食不能為肌肉必至消瘦而死然腑病為客臟病為主治客須急治主須緩病在太陰不可蕩滌以取效必久服而始和蓋陰無驟補之法亦無驟攻之法故取麻仁之甘平入脾潤而多脂者為君杏仁之降氣利竅大黃之走而不守者為臣芍藥之滋陰斂液與枳朴之消導除積者為佐煉蜜為丸少服而漸加焉以和為度此調脾承氣推陳致新之和劑也使脾胃更虛更實而受盛傳道之官各得其職津液相成精血相生神氣以清內外安和形體不敝矣上太陰五方按諸經皆有溫散溫補法惟少陽不用溫諸經皆有益陰清火法惟太陰忌寒涼若熱病傳經有嗌乾等症仍當清火素有脾約大便不順亦當滋陰要知制方全在活法不可執也少陰方總論仲景以病分六經而制方分表裡寒熱虛實之六法六經中各具六法而有偏重焉太陽偏於表寒陽明偏於裡熱太陰偏於虛寒厥陰偏於實熱惟少陽與少陰司樞機之職故無偏重而少陽偏於陽少陰偏於陰制方亦因之而偏重矣然少陰之陰中有陽故其表症根於裡熱證因於寒治表症先顧其里熱症多從寒治者蓋陰以陽為主固腎中之元陽正以存少陰之真陰也其或陽盛陰虛心煩不得臥見於二三日中可用芩連者無幾耳腎本無實實症必轉屬陽明亦由少陰之虛知其虛得其機矣麻黃附子細辛湯麻黃附子甘草湯少陰主裡應無表症病發於陰應無發熱今始受風寒即便發熱似乎太陽而屬之少陰者以頭不痛而但欲寐也內經曰逆冬氣而少陰不藏腎氣獨沉故少陰之發熱而脈沉者必於表劑中加附子以預固其里蓋腎為坎象二陰不藏則一陽無蔽陰邪因得以內侵孤陽無附而外散耳夫太陽為少陰之表發熱無汗太陽之表不得不開沉為在裡少陰之本不得不固設用麻黃開腠理細辛散浮熱而無附子以固元氣則少陰之津液越出太陽之微陽外亡去生遠矣惟附子與麻黃並用內外咸調則風寒散而陽自歸精得藏而陰不擾此里病及表脈沉而當發汗者與表病及里脈浮而可發汗者徑庭矣若得之二三日表熱尚未去里症亦未見麻黃未可去當以甘草之和中易細辛之辛散佐使之任不同則麻黃之勢亦減取微汗而痊是又少陰發表之輕劑矣二方皆少陰中風托裡解外法風本陽邪雖在少陰中而即發不拘於五六日之期用細辛麻黃者所以治風非以治寒也用附子者所以固本非熱因熱用也寒本陰邪即在太陽熱不遽發故有或未發之辭麻黃桂枝長於治風而非治寒之主劑故主治在發熱惡寒若無熱惡寒者雖有頭項強痛之表急當以四逆真武輩救其里矣蓋病發於陰便已亡陽不得以汗多亡陽一語為談柄也少陰制麻附細辛方猶太陽之麻黃湯是急汗之峻劑制麻附甘草湯猶太陽之桂枝湯是緩汗之和劑蓋太陽為陽中之陽而主表其汗易發其邪易散故初用麻黃甘草而助以桂枝次用桂枝生薑而反佐以芍藥少陰為陰中之陰而主裡其汗最不易發其邪最不易散故用麻黃附子而助以細辛其次亦用麻黃附子而緩以甘草則少陰中風脈陽微陰浮者為欲愈非必須陰出之陽而解耶然必細審其脈沉而無里症者可發汗即知脈沉而症為在裡者不可發汗矣此等機關必須看破人皆謂麻黃治太陽之傷寒而不知仲景用以治少陰之中風且麻黃在太陽只服八合不必盡劑妙在更發汗則改用桂枝在少陰始得之與二三日皆可溫服一升日三服則湯液本草分麻黃為太陽經藥猶掘井得泉而曰水專在是矣附子湯人參白朮附子茯苓芍藥此大溫大補之方乃正治傷寒之藥為少陰固本御邪之劑也夫傷則宜補寒則宜溫而近世治傷寒者皆以寒涼克伐相為授受其不講於傷寒二字之名實久矣少陰為陰中之陰又為陰水之藏故傷寒之重者多入少陰所以少陰一經最多死症如少陰病身體痛手足寒骨節痛口中和惡寒脈沉者是純陰無陽之症方中用生附二枚取其力之鋭且以重其任也蓋少火之陽鼓腎間動氣以御外侵之陰翳則守邪之神有權而呼吸之門有鎖鑰身體骨節之痛自除手足自溫惡寒自罷矣以人參固生氣之原令五臟六腑之有本十二經脈之有根腎脈不獨沉矣三陰以少陰為樞設使扶陽而不益陰陰虛而陽無所附非治法之善也故用白朮以培太陰之土芍藥以滋厥陰之木茯苓以利少陰之水水利則精自藏土安則水有所制木潤則火有所生矣扶陽以救寒益陰以固本此萬全之術其畏而不敢用束手待斃者曷可勝計耶此與麻黃附子湯皆治少陰表症而大不同彼因病從外來表有熱而里無熱故當溫而兼散此因病自內出表裡俱寒而上虛故大溫大補然彼發熱而用附子此不熱而用芍藥是又陰陽互根之理欽此與真武湯似同而實異此倍朮附去姜而用參全是溫補以壯元陽彼用姜而不用參尚是溫散以逐水氣補散之分歧只在一味之旋轉歟真武湯附子生薑白朮茯苓芍藥真武主北方水也坎為水而一陽居其中柔中之剛故名真武取此名方者所以治少陰水氣為患也蓋水體本靜其動而不息者火之用耳若坎宮之火用不宣則腎家之水體失職不潤下而逆行故中宮四肢俱病此腹痛下利四肢沉重疼痛小便不利者由坎中陽虛下焦有寒不能制水故也法當壯元陽以消陰翳培土泄水以消留垢故君大熱之附子以奠陰中之陽佐芍藥之酸苦以收炎上之氣茯苓淡滲止潤下之體白朮甘溫制水邪之溢生薑辛溫散四肢之水使少陰之樞機有主則開闔得宜小便得利下利自止腹中四肢之邪解矣若兼咳者是水氣射肺所致加五味之酸溫佐芍藥以收腎中水氣細辛之辛溫佐生薑以散肺中水氣而咳自除若兼嘔者是水氣在胃因中焦不和四肢亦不治此病不涉少陰由於太陰濕化不宣也與治腎水射肺者不同法不須附子以溫腎水倍加生薑以散脾濕此為和中之劑而非治腎之劑矣若大便自利而下利者是胃中無物此腹痛因於胃寒四肢因於脾濕故去芍藥之陰寒加乾薑以佐附子之辛熱即茯苓之甘平者亦去之此為溫中之劑而非利水之劑矣要知真武加減與小柴胡不同小柴胡為少陽半表之劑只不去柴胡一味便可名柴胡湯真武以五物成方為少陰治本之劑去一味便不成真武故去姜加參即名附子湯於此見制方有陰陽動靜之別也白通湯蔥白乾薑附子白通加豬膽汁湯前方加豬膽汁白通者通下焦之陰氣以達於上焦也少陰病自利而渴小便色白者是下焦之陽虛而陰不生少火不能蒸動其水氣而上輸於肺故渴不能生土故自利耳法當用薑附以振元陽而不得升騰之品則利止而渴不能止故佐蔥白以通之蔥白稟西方之色味入通於肺則水出高源而渴自止矣凡陰虛則小便難下利而渴者小便必不利或出澀而難是厥陰火旺宜豬苓白頭翁輩此小便色白屬少陰火虛故曰下焦虛又曰虛故引水自救自救者自病人之意非醫家之正法也若厥陰病欲飲水者少少與之矣通脈四逆湯甘草乾薑附子蔥下利清穀裡寒外熱手足厥逆脈微欲絶此太陰壞症轉屬少陰之症四逆湯所主也而但欲寐是系在少陰若反不惡寒或咽痛乾嘔是為亡陽其人面赤色是為戴陽此下焦虛極矣恐四逆之劑不足以起下焦之元陽而續欲絶之脈故倍加其味作為大劑更加蔥以通之蔥稟東方之色能行少陽生髮之機體空味辛能入肺以行營衛之氣薑附參甘得此以奏捷於經絡之間而脈自通矣脈通則虛陽得歸其部外熱自除而裡寒自解諸症無虞矣按本方以陰症似陽而設症之異於四逆者在不惡寒而面色赤方之異於四逆者若無蔥當與桂枝加桂加芍同矣何更加以通脈之名夫人參所以通血脈安有脈欲絶而不用者舊本乃於方後云面赤色者加蔥利止脈不出者加參豈非抄録者之疏失於本方而蛇足於加法乎且減法所云去者去本方之所有也而此云去蔥芍桂者是後人之加減可知矣茯苓四逆湯茯苓人參甘草乾薑附子乾薑附子湯前方去人參甘草茯苓發汗若下之病仍不解煩躁者茯苓四逆湯主之下後復發汗晝日煩躁不得眠夜則安靜不嘔不渴無表症脈微沉身無大熱者乾薑附子湯主之此二條皆太陽壞病轉屬少陰也凡太陽病而妄汗妄下者其變症或仍在太陽或轉屬陽明或轉系少陽或系在太陰皆是陽氣為患若汗而復下或下而復汗陽氣喪亡則轉屬少陰矣此陽症變陰陰症似陽世醫多不能辨用涼藥以治煩躁鮮有不速其斃者由不知太陽以少陰為里少陰為太陽之根源也脈至少陰則沉微邪入少陰則煩躁煩躁雖六經俱有而兼見於太陽少陰者太陽為真陰之標少陰為真陰之本也陰陽之標本皆從煩躁見煩躁之虛實又從陰陽而分如未經汗下而煩躁屬太陽是煩為陽盛躁為陰虛矣汗下後煩躁屬少陰是煩為陽虛躁為陰竭矣陰陽不相附故煩躁其亡陽亡陰又當以汗之先後表症之解不解為之詳辨則陰陽之差多差少不致溷淆而用方始不誤矣先汗後下於法為順而表仍不解是妄下亡陰陰陽俱虛而煩躁也故制茯苓四逆固陰以收陽先下後汗於法為逆而表症反解內不嘔渴似於陰陽自和而實妄汗亡陽所以虛陽擾於陽分晝則煩躁也故專用乾薑附子固陽以配陰二方皆從四逆加減而有救陽救陰之異茯苓感天地太和之氣化不假根而成能補先天無形之氣安虛陽外脫之煩故以為君人參配茯苓補下焦之元氣乾薑配生附回下焦之元陽調以甘草之甘比四逆為緩固里宜緩也薑附者陽中之陽也用生附而去甘草則勢力更猛比四逆為峻回陽當急也一去甘草一加茯苓而緩急自別加減之妙見用方之神乎吳茱萸湯吳茱萸人參生薑大棗少陰吐利手足厥冷煩躁欲死者此方主之按少陰病吐利煩躁四逆者死此何復出治方要知欲死是不死之機四逆是兼脛臂言手足只指指掌言稍甚微甚之別矣岐伯曰四末陰陽之會氣之大路也四街者氣之經絡也絡絶則經通四末解則氣合從合在肘膝之間即四街也又謂之四關夫四郊擾攘而關中猶固知少陰生氣猶存然五臟更相生不生即死少陰之生氣注於肝陰盛水寒則肝氣不舒而木鬱故煩躁肝血不榮於四末故厥冷水欲出地而不得出則中土不寧故吐利耳病本在腎而病機在肝不得相生之機故欲死勢必溫補少陰之少火以開厥陰之出路生死關頭非用氣味之雄猛者不足以當絶處逢生之任也吳茱萸辛苦大熱稟東方之氣色入通於肝肝溫則木得遂其生矣苦以溫腎則水不寒辛以散邪則土不擾佐人參固元氣而安神明助薑棗調營衛以補四末此撥亂反正之劑與麻黃附子之拔幟先登附子真武之固守社稷者鼎足而立也若命門火衰不能腐熟水穀故食谷欲嘔若干嘔吐涎沫而頭痛是脾腎虛寒陰寒上乘陽位也用此方鼓動先天之少火而後天之土自生培植下焦之真陽而上焦之寒自散開少陰之關而三陰得位者此方是歟上少陰十一方皆溫散溫補法黃連阿膠湯黃連阿膠黃芩芍藥雞子黃內膠煬盡少冷內雞子黃攪令相得溫服七合日三服此少陰之瀉心湯也凡瀉心必藉芩連而導引有陰陽之別病在三陽胃中不和而心下痞硬者虛則加參甘補之實則加大黃下之病在少陰而心中煩不得臥者既不得用參甘以助陽亦不得用大黃以傷胃矣用黃連以直折心火佐芍藥以收斂神明所以扶陰而益陽也然以但欲寐之病情而至於不得臥以微細之病脈而反見心煩非得氣血之屬以交合心腎甘平之味以滋陰和陽不能使水升而火降陰火不歸其部則少陰之熱不除雞子黃稟南方之火色入通於心可以補離宮之火用生者攪和取其流動之義也黑驢皮稟北方之水色且咸先入腎可以補坎宮之精內合於心而性急趨下則阿井有水精凝聚之要也與之相溶而成膠用以配雞子之黃合芩連芍藥是降火歸原之劑矣經曰火位之下陰精承之陰平陽祕精神乃治斯方之謂歟豬苓湯豬苓茯苓澤瀉滑石阿膠少陰病得之二三日心煩不得臥是上焦實熱宜黃連阿膠湯清之少陰病欲吐不吐心煩但欲寐至五六日自利而渴者是下焦虛寒宜白通湯以溫之此少陰初病而下利似為虛寒至六七日反見咳而嘔渴心煩不得臥者此豈上焦實熱乎是因下多亡陰精虛不能化氣真陽不藏致上焦之虛陽擾攘而致變症見也下焦陰虛而不寒非薑附所宜上焦虛而非實熱非芩連之任故制此方二苓不根不苗成於太空元氣用以交合心腎通虛無氤氳之氣也阿膠味厚乃氣血之屬是精不足者補之以味也澤瀉氣味輕清能引水氣上升滑石體質重墜能引火氣下降水升火降得既濟之理矣且豬苓阿膠黑色通腎理少陰之本茯苓滑石白色通肺滋少陰之源澤瀉阿膠咸先入腎培少陰之體二苓滑石淡滲膀胱利少陰之用五味皆甘淡得土中衝和之氣是水位之下土氣承之也五物皆潤下皆滋陰益氣之品是君火之下陰精承之也以此滋陰利水而升津諸症自平矣四逆散柴胡枳實芍藥甘草少陰病四逆泄利下重其人或咳或悸或小便不利或腹中痛者此方主之少陰為水火同處之臟水火不和則陰陽不相順接四肢為陰陽之會故厥冷四逆有寒熱之分胃陽不敷於四肢為寒厥陽邪內擾於陰分為熱厥然四肢不溫故厥者必利先審瀉利之寒熱而四逆之寒熱判矣下利清穀為寒當用薑附壯元陽之本泄瀉下重為熱故用白芍枳實酸苦湧泄之品以清之不用芩連者以病於陰而熱在下焦也更用柴胡之苦平者以升散之令陰火得以四達佐甘草之甘涼以緩其下重合而為散散其實熱也用白飲和服中氣和而四肢之陰陽自接三焦之熱自平矣此症以泄利下重知少陰之陽邪內擾於陰四逆即非寒症矣四逆皆少陰樞機無主升降不利所致只宜治下重不須兼治諸症也仲景因有四逆症欲以別於四逆湯故以四逆散名之本方有咳者加五味乾薑悸者加桂枝腹痛加附子泄利下重加薤白俱非泄利下重所宜且五味薑桂加五分於附子加一枚薤白三升何多寡不同若是且以散只服方寸匕恐不濟此症此後人附會可知也豬膚湯豬膚白蜜白粉少陰病多下利以下焦之虛也陰虛則陽無所附故下焦虛寒者反見上焦之實熱少陰脈循喉嚨挾舌本其支者出絡心注胸中凡腎精不足腎火不藏必循經上走於陽分也咽痛胸滿心煩者因陰並於下而陽並於上承不上承於心火不下交於腎此未濟之象豬為水畜而津液在膚取其膚以治上焦虛浮之火和白蜜白粉之甘瀉心潤肺而和脾滋化原培母氣水升火降上熱下行虛陽得歸其部不治利而利自止矣三味皆食物不藉於草所謂隨手拈來盡是道矣甘草湯甘草桔梗湯甘草桔梗半夏湯半夏桂枝甘草苦酒湯半夏雞子白苦酒四方皆因少陰咽痛而設也少陰之脈循喉嚨挾舌本故有咽痛症若因於他症而咽痛者不必治其咽如脈陰陽俱緊反汗出而吐利者此亡陽也只回其陽則吐利止而咽痛自除如下利而胸滿心煩者是下焦虛而上焦熱也升水降火上下和調而痛自止若無他症而但咽痛者又有寒熱之別見於二三日是陰火上衝可與甘草湯甘涼瀉火以緩其熱不瘥者配以桔梗兼辛以散之所謂奇之不去而偶之也二方為正治之輕劑以少陰為陰中之陰脈微細而但欲寐不得用苦寒之劑也若其陰症似陽惡寒而欲吐者非甘桔所能療當用半夏之辛溫散其上逆之邪桂枝之甘溫散其陰寒之氣緩以甘草之甘平和以白飲之穀味或為散或為湯隨病之意也如咽中因痛而且傷生瘡不能言語聲不出者不得即認為熱症必因嘔而咽痛胸中之痰飲未散仍用半夏之辛溫取苦酒之酸以斂瘡雞子白之清以發聲且三味相合而半夏減辛烈之猛苦酒緩收斂之驟取雞子白之潤滋其咽喉又不令泥痰飲於胸膈也故其法以雞子連殼置刀環中安火上只三沸即去滓此意在略見火氣不欲盡出半夏之味也明矣二方皆少少含咽是從治緩劑按雞卵法太極之形含陰陽兩氣其黃走血分故心煩不臥者用之此仲景用藥法象之義也上少陰七方皆涼解法後二方皆溫補法厥陰方總論太陰以理中丸為主厥陰以烏梅丸為主丸者緩也太陰之緩所以和脾胃之氣厥陰之緩所以制相火之逆也觀所主諸方治手足厥冷脈微欲絶而不用薑附下利脈沉結而用黃柏心動悸脈代結而用生地麥冬總因肝有相火當瀉無補與腎中虛陽之發當補當溫者不同耳夫三陰皆有本經之熱太陰之熱脾家實而行胃脘之陽也少陰之熱腎陰虛而元陽發越也厥陰之熱肝膽熱而拂鬱之火內熱也舉世誤於傳經熱邪之說遇三陰熱症漫無主張見發熱脈沉者斷為陽症見陰脈而不治中風下利者妄呼為漏底傷寒不明仲景之論因不敢用仲景之方非不學無術乎烏梅丸烏梅乾薑桂枝附子蜀椒黃連黃柏人參當歸細辛六經惟厥陰最為難治其本陰而標熱其體風木其用相火以其具合晦朔之理陰之初盡即陽之初出所以一陽為紀一陰為獨則厥陰病熱是少陽之相火使然也火旺則水虧故消渴氣有餘便是火故氣上撞心心中疼熱木甚則剋土故飢不欲食是為風化飢則胃中空虛蛔聞食臭則出故吐蛔此厥陰之火症非厥陰之傷寒也內經曰必伏其所主而先其所因或收或散或逆或從隨所利而行之調其中氣使之和平是厥陰之治法也仲景之方多以辛甘甘涼為君獨此方用酸收之品者以厥陰主肝而屬木洪範云木曰曲直曲直作酸內經曰木生酸酸入肝以酸瀉之以酸收之君烏梅之大酸是伏其所主也佐黃連瀉心而除痞黃柏滋腎以除渴先其所因也腎者肝之母椒附以溫腎則火有所歸而肝得所養是固其本也肝欲散細辛乾薑以散之肝藏血桂枝當歸引血歸經也寒熱並用五味兼收則氣味不和故佐以人參調其中氣以苦酒浸烏梅同氣相求蒸之米下資其穀氣加蜜為丸少與而漸加之緩以治其本也仲景此方本為厥陰諸症之法叔和編於吐蛔條下令人不知有厥陰之主方觀其用藥與諸症符合豈只吐蛔一症耶蛔為生冷之物與濕熱之氣相成故寒熱互用以治之且胸中煩而吐蛔則連柏是寒因熱用蛔得酸則靜得辛則伏得苦則下殺蟲之方無更出其上者久利則虛調其寒熱扶其正氣酸以收之其利自止愚按厥利發熱諸症諸條不立方治當知治法不出此方矣當歸四逆湯桂枝芍藥當歸細辛通草甘草大棗當歸四逆加吳茱萸生薑湯前方加吳茱萸生薑酒此厥陰傷寒發散表邪之劑也厥陰居兩陰之交盡名曰陰之絶陽外傷於寒則陰陽之氣不相順接故手足厥冷脈微欲絶然相火居於厥陰之臟臟氣實熱則寒邪不能侵只外傷於經而內不傷臟故先厥者後必發熱凡傷寒初起內無寒症而外寒極盛者但當溫散其表勿遽溫補其表此方用桂枝湯以解外而以當歸為君者因厥陰主肝為血室也肝苦急甘以緩之故倍加大棗猶小建中加飴糖法肝欲散當以辛散之細辛其辛能通三陰之氣血外達於毫端比麻黃更猛可以散在表之嚴寒不用生薑不取其橫散也通草即木通能通九竅而通關節用以開厥陰之闔而行氣於肝夫陰寒如此而仍用芍藥者須防相火之為患也是方桂枝得歸芍生血於營細辛同通草行氣於衛甘草得棗氣血以和且緩中以調肝則營氣得至手太陰而脈自不絶溫表以逐邪則衛氣行四末而手足自溫不須參術之補不用薑桂之燥此厥陰之四逆與太少不同治而仍不失辛甘發散為陽之理也若其人內有久寒者其相火亦不足加吳萸之辛熱直達厥陰之臟生薑之辛散淫氣於筋清酒以溫經絡筋脈不沮弛則氣血如故而四肢自溫脈息自至矣此又治厥陰內外兩傷於寒之劑也冷結膀胱而少腹滿痛手足厥冷者宜之小建中湯桂枝芍藥甘草生薑大棗飴糖厥陰為闔外傷於寒肝氣不舒熱鬱於下致傷中氣故制此方以主之凡六經外感未解者皆用桂枝湯解外如太陽誤下而陽邪下陷於太陰者桂枝湯倍加芍藥以瀉木邪之干脾也此肝火上逼於心脾於桂枝加芍藥湯中更加飴糖取酸苦以平肝臟之火辛甘以調脾家之急又資其穀氣以和中也此方安內攘外瀉中兼補故名曰建外症未除尚資薑桂以散表不全主中故稱曰小所謂中者有二一曰心中一曰腹中如傷寒二三日心中悸而煩者是厥陰之氣逆上衝於心也比心中疼熱者稍輕而有虛實之別疼而熱者為實當用苦寒以瀉心火悸而煩者為虛當用甘溫以保心氣是建腹中之宮城也傷寒陽脈澀陰脈弦腹中急痛者是厥陰之逆氣上侵脾胃也比飢不欲食食則吐蛔者為更重而有形氣之別食即吐蛔為有形當用酸苦以安蛔腹中急痛為無形當用辛寒以止痛是建腹中之都會也世不明厥陰之為病便不知仲景所以制建中之理不知膽藏肝內則不明仲景先里後表之法蓋寒雖外來而熱從中發必先開厥陰之闔始得轉少陰之樞先平厥陰陰脈之弦始得通少陽陽脈之澀此腹中痛者先與小建中湯不瘥者繼用小柴胡湯之理也凡腹痛而用芍藥者因相火為患若因於虛寒者大非所宜故有建中理中之別或問腹痛既與小建中溫之更用小柴胡涼之先熱後寒仲景亦姑試之乎曰不瘥者但未愈非更甚也先之以建中是解肌而發表止痛在芍藥繼之以柴胡是補中以逐邪止痛在人參按柴胡加減法腹中痛者去黃芩加芍藥其功倍於建中可知陽脈仍澀故用人參以助桂枝陰脈仍弦故用柴胡以助芍藥若一服建中而即瘥則不必人參之補亦不須柴胡之散矣茯苓甘草湯桂枝生薑茯苓甘草此厥陰傷寒發散內邪之汗劑凡傷寒厥而心下悸者宜先治水後治其厥不爾水漬入胃必作利也此方本欲利水反取表藥為里症用故雖重用薑桂而以里藥名方耳厥陰傷寒先熱者後必厥先熱時必消渴今厥而心下悸是下利之源斯時不熱不渴可知矣因消渴時飲水多心下之水氣不能入心為汗蓄而不消故四肢逆冷而心下悸也肺為水母肺氣不化則水氣不行茯苓為化氣之品故能清水之源然得豬苓澤瀉則行西方收降之令下輸膀胱而為溺桂枝生薑則從辛入肺使水氣通於肺以行營衛陰陽則外走肌表而為汗矣佐甘草以緩之汗出周身而厥自止水精四布而悸自安以之治水者即所以治厥也凡厥陰之渴在未汗時太陽之渴在發汗後如傷寒心悸汗出而渴者是水氣不行而津液又不足須小發汗以散水氣故用五苓傷寒心悸無汗而不渴者津液未虧故可用此方大發其汗五苓因小發汗故少佐桂枝不用生薑用白朮者恐漬水入脾也此用薑桂與茯苓等分而不用芍藥大棗是大發其汗佐甘草者一以協辛發汗且恐水漬入胃也厥陰厥而不利與見厥復利者因熱少而不能消水水漬入胃故仲景言其症而未及治法與本方汗之則利自止是下者舉之之義也本方為汗家峻劑與麻黃湯義異而奏捷則同因水氣在心下而不在皮毛故不用麻黃悸而不喘故不用杏仁且外不熱而內不渴故不用小青龍仲景化水發汗之劑不同如此按傷寒汗出而渴是傷寒溫病分歧處大宜著眼要知不惡寒反惡熱者即是溫病有水氣而心下悸尚是傷寒若無水氣則五苓燥熱即溫病發火之藥矣炙甘草湯炙甘草人參阿膠麻仁桂枝麥冬生薑大棗清酒生地厥陰傷寒則相火內郁肝氣不舒血室乾涸以致營氣不調脈道澀滯而見代結之象如程郊倩所云此結者不能前而代替非陰盛也凡厥陰病則氣上衝心故心動悸此悸動因於脈代結而手足不厥非水氣為患矣不得甘寒多液之品以滋陰而和陽則肝火不息而心血不生心不安其位則悸動不止脈不復其常則代結何以調故用生地為君麥冬為臣炙甘草為佐大劑以峻補真陰開來學滋陰之一路也反以甘草名方者藉其載藥入心補離中之虛以安神明耳然大寒之劑無以奉發陳蕃秀之機必須人參桂枝佐麥冬以通脈薑棗佐甘草以和營膠麻佐地黃以補血甘草不使速下清酒引之上行且生地麥冬得酒力而更優也燒裩散男女交媾而病傳焉奇病也其授者始因傷寒而實種於欲火其受者因於欲火而實發於陰虛此陰陽易之病所由來也無惡寒發熱之表無胃實自利之症此因兩精相搏而當時即發與冬不藏精春必病溫者不同夫邪之所湊其氣必虛陰虛者陽必湊之故少氣而熱上衝胸氣少不得運故頭重不舉身體皆重邪中於陰故陰中拘攣衝任脈傷故少腹裡急精神散亂故目中生花動搖筋骨故膝脛拘急病由於腎毒侵水道故小便不利諒非金石所能愈仍須陰陽感召之理以致之裩襠者男女陰陽之衛衛乎外者自能清乎內感於無形者治之以有形取其隱內燒而服之形氣相感小便即利陰頭微腫濁陰走下竅而清陽出上竅欲火平而諸症自息矣男服女女服男然更宜六味地黃湯合生脈散治之六經方餘論既論制方之大法又分六經之方以論之亦云詳矣而定方不同之故更不可不辨也夫風寒暑濕之傷人六經各有所受而發見之脈不同或脈同而症異或脈症皆同而主症不同者此經氣之有別也蓋六經分界如九州之風土人物雖相似而衣冠飲食言語性情之不同因風土而各殊則人身表裡之寒熱虛實亦皆因經氣而異矣如太陽一經寒熱互呈虛實遞見治之者當於表中顧里故發表諸方往往兼用里藥陽明之經主實熱治者當於實中防虛故制攻下諸方而又叮嚀其不可輕用少陽之經氣主虛熱故立方涼解每用人參太陰之經氣主虛寒故立方溫補不離薑附少陰之經氣多虛寒故雖見表熱而用附子亦間有虛熱故亦有滋陰之劑厥陰之經氣主實熱故雖手足厥冷脈微欲絶而不用薑附然此為無形之實熱與陽明有形之實熱徑庭矣仲景制方因乎經氣內經審其陰陽以別剛柔陽病治陰陰病治陽定其氣血各守其鄉之理也所以表裡攻補陰陽之品或同或異者亦因其經氣血之多少而為之定劑耳請再以表裡論之三陽主表而有里三陰主裡而無表何也太陽為五臟之主以胸中為里以少陰為里陽明為六腑之主以腹中為里以太陰為里少陽為十一臟所決之主故胸腹皆為其里而無定位以厥陰為里猶運籌於帷幄也治三陽者既顧心腹之裡又顧三陰之裡所以陽經之方倍於陰經而陽有多少病有難易所以陽明之方不及太陽少陽之方更少於陽明也三陰非無表症也而謂其無表故少陰之一身盡熱無非太陽漸外之陽太陰之四肢煩疼原是胃脘之所發厥陰之厥而發熱疇非三焦膽甲之氣也第不頭痛項強胃家不實不口苦目眩定其為陰經耳三陰之表自三陽來所以三陰表劑仍用麻黃桂枝為出路太陰之芍藥少陰之附子厥陰之當歸得互列於表劑之間並行而不悖此內經陰陽表裡雌雄相輸應之義也麻黃升麻湯麻黃升麻黃芩知母石膏芍藥天冬乾薑桂枝當歸茯苓白朮玉竹甘草六經方中有不出於仲景者合於仲景則亦仲景而已矣若此湯其大謬者也傷寒六七日大下後寸脈沉而遲夫寸為陽主上焦沉而遲是無陽矣沉為在裡則不當發汗遲為臟寒則不當清火且下部脈不至手足厥冷泄利不止是下焦之元陽已脫又咽喉不利吐膿血是上焦之虛陽無依而將亡故擾亂也如用參附以回陽而陽不可回故曰難治則仲景不立方治也明矣此用麻黃升麻桂枝以散之彙集知母天冬黃芩芍藥石膏等大寒之品以清之以治陽實之法治亡陽之症是速其陽之斃也安可望其汗出而愈哉用乾薑一味之溫苓朮甘歸之補取玉竹以代人參是猶攻金城高壘而用老弱之師也且用藥至十四味猶廣羅原野冀獲一兔與防風通聖等方同為粗工僥幸之符也謂東垣用藥多多益善者是不論脈病之合否而殆為妄談歟
